<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #E5E3DF; font-family: 'Space Grotesk', sans-serif; padding: 20px; }
.row { display: flex; gap: 8px; flex-wrap: wrap; }
.swatch { display: flex; flex-direction: column; }
.chip { width: 96px; height: 64px; border: 1px solid rgba(16,35,45,0.12); }
.name { font-family: 'Syncopate', sans-serif; font-weight: 700; font-size: 8px; text-transform: uppercase; margin-top: 6px; color: #10232D; letter-spacing: 0.05em; }
.hex { font-size: 11px; color: #49616E; margin-top: 2px; }
</style><link rel="stylesheet" href="../colors_and_type.css">
</head><body>
<div class="row">
  <div class="swatch"><div class="chip" style="background:#F5F8FA;"></div><div class="name">Ambient White</div><div class="hex">#F5F8FA</div></div>
  <div class="swatch"><div class="chip" style="background:#E5E3DF;"></div><div class="name">The Sands</div><div class="hex">#E5E3DF</div></div>
  <div class="swatch"><div class="chip" style="background:#ABADB3;"></div><div class="name">Integrayted</div><div class="hex">#ABADB3</div></div>
  <div class="swatch"><div class="chip" style="background:#A6B0B6;"></div><div class="name">Loan Shark</div><div class="hex">#A6B0B6</div></div>
  <div class="swatch"><div class="chip" style="background:#535559;"></div><div class="name">Unified Gray</div><div class="hex">#535559</div></div>
  <div class="swatch"><div class="chip" style="background:#101111;"></div><div class="name">Logical Black</div><div class="hex">#101111</div></div>
</div>
</body></html>
