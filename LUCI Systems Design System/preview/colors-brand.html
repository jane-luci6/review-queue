<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #F5F8FA; font-family: 'Space Grotesk', sans-serif; padding: 20px; }
.row { display: flex; gap: 8px; flex-wrap: wrap; }
.swatch { display: flex; flex-direction: column; }
.chip { width: 96px; height: 64px; }
.name { font-family: 'Syncopate', sans-serif; font-weight: 700; font-size: 8px; text-transform: uppercase; margin-top: 6px; color: #10232D; letter-spacing: 0.05em; }
.hex { font-size: 11px; color: #49616E; margin-top: 2px; }
</style><link rel="stylesheet" href="../colors_and_type.css">
</head><body>
<div class="row">
  <div class="swatch"><div class="chip" style="background:#0A161C;"></div><div class="name">Pit Boss Blue</div><div class="hex">#0A161C</div></div>
  <div class="swatch"><div class="chip" style="background:#10232D;"></div><div class="name">Controlled Blue</div><div class="hex">#10232D</div></div>
  <div class="swatch"><div class="chip" style="background:#314955;"></div><div class="name">Sportsbook Blue</div><div class="hex">#314955</div></div>
  <div class="swatch"><div class="chip" style="background:#49616E;"></div><div class="name">Immersive Slate</div><div class="hex">#49616E</div></div>
  <div class="swatch"><div class="chip" style="background:#68E3BE;"></div><div class="name">High Limit Mint</div><div class="hex">#68E3BE</div></div>
  <div class="swatch"><div class="chip" style="background:#FA564C;"></div><div class="name">Jackpot Red</div><div class="hex">#FA564C</div></div>
</div>
</body></html>
