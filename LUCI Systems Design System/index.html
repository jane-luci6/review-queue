<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LUCI Systems — Design System Hub</title>
  <link rel="stylesheet" href="colors_and_type.css">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: var(--font-body);
      background: var(--bg-dark);
      color: var(--fg-on-dark);
      display: flex;
    }

    .hub-nav {
      width: 280px;
      min-width: 280px;
      height: 100vh;
      background: var(--color-pit-boss-blue);
      border-right: var(--border-dark);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
      flex-shrink: 0;
      transition: width 0.22s ease, min-width 0.22s ease;
    }

    .hub-nav.is-collapsed {
      width: 52px;
      min-width: 52px;
    }

    .hub-nav__toggle {
      position: absolute;
      top: 14px;
      right: 8px;
      z-index: 2;
      width: 36px;
      height: 36px;
      padding: 0;
      border: 1px solid var(--color-controlled-blue);
      background: var(--color-controlled-blue);
      color: var(--color-high-limit-mint);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, border-color 0.15s;
    }

    .hub-nav.is-collapsed .hub-nav__toggle {
      right: 50%;
      transform: translateX(50%);
      top: 16px;
    }

    .hub-nav__toggle:hover {
      background: rgba(104, 227, 190, 0.12);
      border-color: var(--color-high-limit-mint);
    }

    .hub-nav__toggle-icon {
      display: block;
      width: 8px;
      height: 8px;
      border-right: 2px solid currentColor;
      border-bottom: 2px solid currentColor;
      transform: rotate(135deg);
      margin-left: 3px;
      transition: transform 0.22s ease;
    }

    .hub-nav.is-collapsed .hub-nav__toggle-icon {
      transform: rotate(-45deg);
      margin-left: -3px;
    }

    .hub-nav__collapsible {
      display: flex;
      flex-direction: column;
      flex: 1;
      min-height: 0;
      overflow: hidden;
      opacity: 1;
      transition: opacity 0.15s ease;
    }

    .hub-nav.is-collapsed .hub-nav__collapsible {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .hub-nav__rail {
      display: none;
      flex: 1;
      writing-mode: vertical-rl;
      text-orientation: mixed;
      transform: rotate(180deg);
      align-items: center;
      justify-content: center;
      padding: var(--space-5) 0;
      font-family: var(--font-display);
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--color-loan-shark);
      user-select: none;
    }

    .hub-nav.is-collapsed .hub-nav__rail {
      display: flex;
    }

    .hub-nav__brand {
      padding: var(--space-5) calc(var(--space-4) + 40px) var(--space-5) var(--space-4);
      border-bottom: 1px solid var(--color-controlled-blue);
      flex-shrink: 0;
    }

    .hub-nav__brand .mark {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--color-high-limit-mint);
      margin-bottom: var(--space-2);
    }

    .hub-nav__brand h1 {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 14px;
      line-height: 1.35;
      text-transform: uppercase;
      color: var(--fg-on-dark);
    }

    .hub-nav__scroll {
      flex: 1;
      overflow-y: auto;
      padding: var(--space-3) 0 var(--space-6);
    }

    .hub-nav__link {
      display: block;
      width: 100%;
      text-align: left;
      border: none;
      background: transparent;
      font-family: var(--font-body);
      font-weight: 500;
      font-size: 13px;
      letter-spacing: 0;
      color: var(--color-loan-shark);
      padding: 9px var(--space-4);
      cursor: pointer;
      border-left: 3px solid transparent;
      transition: color 0.15s, background 0.15s, border-color 0.15s;
    }

    .hub-nav__link:hover {
      color: var(--fg-on-dark);
      background: rgba(104, 227, 190, 0.06);
    }

    .hub-nav__link.is-active {
      color: var(--color-high-limit-mint);
      background: rgba(104, 227, 190, 0.1);
      border-left-color: var(--color-high-limit-mint);
    }

    .hub-nav__link--overview { margin-bottom: var(--space-2); }

    /* Accordion */
    .hub-accordion { border-bottom: 1px solid rgba(16, 35, 45, 0.6); }

    .hub-accordion__trigger {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      padding: 12px var(--space-4);
      border: none;
      background: transparent;
      cursor: pointer;
      text-align: left;
      gap: var(--space-3);
    }

    .hub-accordion__trigger:hover { background: rgba(104, 227, 190, 0.04); }

    .hub-accordion__label {
      font-family: var(--font-body);
      font-weight: 600;
      font-size: 13px;
      letter-spacing: 0;
      color: var(--color-loan-shark);
    }

    .hub-accordion__count {
      font-family: var(--font-body);
      font-size: 10px;
      font-weight: 500;
      color: var(--color-immersive-slate);
      margin-left: auto;
      margin-right: 6px;
      text-transform: none;
      letter-spacing: 0;
    }

    .hub-accordion__chevron {
      flex-shrink: 0;
      width: 8px;
      height: 8px;
      border-right: 2px solid var(--color-loan-shark);
      border-bottom: 2px solid var(--color-loan-shark);
      transform: rotate(-45deg);
      transition: transform 0.2s, border-color 0.15s;
      margin-top: -2px;
    }

    .hub-accordion.is-open .hub-accordion__chevron {
      transform: rotate(45deg);
      margin-top: 2px;
      border-color: var(--color-high-limit-mint);
    }

    .hub-accordion.is-open .hub-accordion__label { color: var(--fg-on-dark); }

    .hub-accordion__panel {
      display: none;
      padding-bottom: var(--space-2);
    }

    .hub-accordion.is-open .hub-accordion__panel { display: block; }

    .hub-accordion__panel .hub-nav__link {
      font-size: 13px;
      padding: 7px var(--space-4) 7px calc(var(--space-4) + 6px);
      letter-spacing: 0;
    }

    .hub-accordion__subheading {
      font-family: var(--font-body);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--color-immersive-slate);
      padding: 12px var(--space-4) 3px calc(var(--space-4) + 6px);
      user-select: none;
    }

    /* Nested sub-accordion (second level) */
    .hub-sub-accordion { }

    .hub-sub-accordion__trigger {
      display: flex;
      align-items: center;
      width: 100%;
      padding: 8px var(--space-4) 8px calc(var(--space-4) + 6px);
      border: none;
      background: transparent;
      cursor: pointer;
      text-align: left;
      gap: 6px;
      font-family: var(--font-body);
      font-size: 12px;
      font-weight: 600;
      color: var(--color-loan-shark);
      transition: color 0.15s, background 0.15s;
    }

    .hub-sub-accordion__trigger:hover {
      color: var(--fg-on-dark);
      background: rgba(104, 227, 190, 0.04);
    }

    .hub-sub-accordion.is-open .hub-sub-accordion__trigger {
      color: var(--fg-on-dark);
    }

    .hub-sub-accordion__chevron {
      flex-shrink: 0;
      width: 6px;
      height: 6px;
      border-right: 1.5px solid currentColor;
      border-bottom: 1.5px solid currentColor;
      transform: rotate(-45deg);
      transition: transform 0.2s;
      margin-top: -1px;
    }

    .hub-sub-accordion.is-open .hub-sub-accordion__chevron {
      transform: rotate(45deg);
      margin-top: 1px;
    }

    .hub-sub-accordion__panel {
      display: none;
      padding-bottom: var(--space-1);
    }

    .hub-sub-accordion.is-open .hub-sub-accordion__panel {
      display: block;
    }

    .hub-sub-accordion__panel .hub-nav__link {
      padding-left: calc(var(--space-4) + 20px);
      font-size: 12px;
    }

    /* Session notes widget */
    .hub-session {
      border-left: 3px solid var(--color-high-limit-mint);
      padding: var(--space-4) var(--space-5);
      margin-bottom: var(--space-6);
    }

    .hub-session--pickup {
      background: rgba(104, 227, 190, 0.06);
      border-left-width: 4px;
    }

    .hub-priority,
    .hub-paused,
    .hub-backlog {
      margin-bottom: var(--space-6);
    }

    .hub-queue__item {
      border-bottom: 1px solid rgba(16, 35, 45, 0.06);
    }

    .hub-queue__item summary {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      padding: 12px 12px 12px 8px;
      cursor: pointer;
      list-style: none;
    }

    .hub-queue__item summary::-webkit-details-marker { display: none; }

    .hub-queue__item summary::before {
      content: '';
      width: 6px;
      height: 6px;
      border-right: 2px solid var(--fg-subdued);
      border-bottom: 2px solid var(--fg-subdued);
      transform: rotate(-45deg);
      flex-shrink: 0;
      margin-left: 4px;
      transition: transform 0.15s;
    }

    .hub-queue__item[open] summary::before {
      transform: rotate(45deg);
    }

    .hub-queue__badge {
      font-family: var(--font-body);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 3px 7px;
      flex-shrink: 0;
      background: rgba(16, 35, 45, 0.06);
      color: var(--fg-subdued);
    }

    .hub-queue__badge--p1 {
      background: rgba(255, 193, 7, 0.15);
      color: #8a6800;
    }

    .hub-queue__badge--p2 {
      background: rgba(104, 227, 190, 0.12);
      color: var(--accent-primary-dark);
    }

    .hub-queue__badge--later {
      background: rgba(16, 35, 45, 0.05);
      color: var(--fg-subdued);
    }

    .hub-queue__title {
      font-family: var(--font-body);
      font-weight: 600;
      font-size: 14px;
      color: var(--fg-on-light);
      flex: 1;
      min-width: 0;
    }

    .hub-queue__status {
      font-size: 11px;
      color: var(--fg-subdued);
      flex-shrink: 0;
    }

    .hub-queue__detail {
      padding: 0 12px 14px 36px;
      font-size: 13px;
      color: var(--fg-subdued);
      line-height: 1.55;
      white-space: pre-wrap;
    }

    .hub-queue__open {
      display: inline-block;
      margin-top: 8px;
      font-family: var(--font-body);
      font-size: 12px;
      font-weight: 600;
      color: var(--accent-primary-dark);
      background: none;
      border: none;
      padding: 0;
      cursor: pointer;
      text-decoration: underline;
    }

    .hub-queue__open:hover { color: var(--fg-on-light); }

    .hub-session__header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: var(--space-2);
    }

    .hub-session__label {
      font-family: var(--font-body);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--color-high-limit-mint);
    }

    .hub-session__date {
      font-size: 12px;
      color: var(--fg-subdued);
    }

    .hub-session__text {
      font-size: 14px;
      line-height: 1.6;
      color: var(--fg-on-light);
      white-space: pre-wrap;
      min-height: 1.6em;
    }

    .hub-pickup__goal {
      font-weight: 600;
      font-size: 15px;
      line-height: 1.45;
      color: var(--fg-on-light);
      margin: 0 0 var(--space-4);
    }

    .hub-pickup__heading {
      font-family: var(--font-body);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--fg-subdued);
      margin: var(--space-4) 0 var(--space-2);
    }

    .hub-pickup__heading:first-child {
      margin-top: 0;
    }

    .hub-pickup__list {
      margin: 0 0 var(--space-2);
      padding-left: 20px;
      list-style: none;
    }

    .hub-pickup__list li {
      position: relative;
      font-size: 14px;
      line-height: 1.55;
      color: var(--fg-on-light);
      padding-left: 4px;
      margin-bottom: 8px;
    }

    .hub-pickup__list li::before {
      content: '';
      position: absolute;
      left: -16px;
      top: 0.55em;
      width: 5px;
      height: 5px;
      background: var(--color-high-limit-mint);
      border-radius: 50%;
    }

    .hub-session__text:empty::before {
      content: 'Nothing recorded yet — click Edit to add a note.';
      color: var(--fg-subdued);
      font-style: italic;
    }

    .hub-session__textarea {
      display: none;
      width: 100%;
      min-height: 80px;
      font-family: var(--font-body);
      font-size: 14px;
      line-height: 1.6;
      color: var(--fg-on-light);
      background: rgba(255,255,255,0.6);
      border: 1px solid var(--color-integrayted);
      padding: var(--space-3);
      resize: vertical;
      outline: none;
    }

    .hub-session__textarea:focus {
      border-color: var(--color-high-limit-mint);
    }

    .hub-session__actions {
      display: flex;
      gap: var(--space-3);
      margin-top: var(--space-3);
    }

    .hub-session__btn {
      font-family: var(--font-body);
      font-size: 12px;
      font-weight: 600;
      border: none;
      background: none;
      cursor: pointer;
      padding: 4px 0;
      color: var(--accent-primary-dark);
      text-decoration: underline;
    }

    .hub-session__btn:hover { color: var(--fg-on-light); }

    .hub-nav__footer {
      padding: var(--space-4);
      border-top: 1px solid var(--color-controlled-blue);
      font-size: 12px;
      line-height: 1.5;
      color: var(--color-loan-shark);
      flex-shrink: 0;
    }

    .hub-nav__footer a {
      color: var(--color-high-limit-mint);
      text-decoration: none;
    }

    .hub-nav__footer a:hover { text-decoration: underline; }

    .hub-main {
      flex: 1;
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: #F5F7F9;
      min-width: 0;
    }

    .hub-toolbar {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-4);
      padding: var(--space-3) var(--space-5);
      background: var(--bg-surface);
      border-bottom: 1px solid var(--color-integrayted);
    }

    .hub-toolbar__title {
      font-family: var(--font-body);
      font-weight: 600;
      font-size: 13px;
      color: var(--fg-on-light);
      letter-spacing: 0;
    }

    .hub-toolbar__path {
      font-size: 12px;
      color: var(--fg-subdued);
      font-family: monospace;
    }

    .hub-toolbar__open {
      font-family: var(--font-body);
      font-weight: 600;
      font-size: 12px;
      color: var(--accent-primary-dark);
      text-decoration: none;
      white-space: nowrap;
    }

    .hub-toolbar__open:hover { text-decoration: underline; }

    .hub-stage {
      flex: 1;
      position: relative;
      min-height: 0;
    }

    .hub-stage iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
      background: var(--bg-surface);
    }

    .hub-overview {
      position: absolute;
      inset: 0;
      overflow-y: auto;
      padding: var(--space-7) var(--space-7) var(--space-8);
      display: none;
    }

    .hub-overview.is-visible { display: block; }

    .hub-overview__inner {
      max-width: 880px;
    }

    .hub-overview .luci-h2 {
      font-family: var(--font-body);
      font-weight: 700;
      font-size: 22px;
      color: var(--fg-on-light);
      margin-bottom: var(--space-2);
      letter-spacing: -0.01em;
    }

    .hub-overview__lede {
      font-size: 14px;
      line-height: 1.6;
      color: var(--fg-subdued);
      max-width: 52ch;
      margin-bottom: var(--space-6);
    }

    .hub-overview__section {
      margin-bottom: var(--space-6);
    }

    .hub-overview__heading {
      font-family: var(--font-body);
      font-weight: 600;
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--fg-subdued);
      margin-bottom: 0;
      padding-bottom: 8px;
      border-bottom: 1px solid rgba(16, 35, 45, 0.1);
    }

    .hub-cards {
      display: flex;
      flex-direction: column;
    }

    .hub-card {
      display: flex;
      align-items: baseline;
      gap: var(--space-5);
      padding: 10px 12px;
      border-bottom: 1px solid rgba(16, 35, 45, 0.06);
      border-left: 3px solid transparent;
      cursor: pointer;
      text-align: left;
      background: transparent;
      border-top: none;
      border-right: none;
      transition: border-left-color 0.15s, background 0.15s;
      width: 100%;
    }

    .hub-card:hover {
      border-left-color: var(--color-high-limit-mint);
      background: rgba(104, 227, 190, 0.04);
    }

    .hub-card__label {
      font-family: var(--font-body);
      font-weight: 600;
      font-size: 14px;
      color: var(--fg-on-light);
      flex-shrink: 0;
      min-width: 220px;
      max-width: 280px;
    }

    .hub-card__desc {
      font-size: 13px;
      color: var(--fg-subdued);
      line-height: 1.5;
    }

    /* Recent work items */
    .hub-recent { margin-bottom: var(--space-6); }

    .hub-recent__item {
      border-left: 3px solid var(--color-high-limit-mint);
      border-bottom: 1px solid rgba(16, 35, 45, 0.06);
      background: transparent;
      width: 100%;
    }

    .hub-recent__item details { width: 100%; }

    .hub-recent__item summary {
      display: flex;
      align-items: flex-start;
      gap: var(--space-4);
      padding: 14px 12px 14px 12px;
      cursor: pointer;
      list-style: none;
      transition: background 0.15s;
    }

    .hub-recent__item summary::-webkit-details-marker { display: none; }

    .hub-recent__item summary:hover { background: rgba(104, 227, 190, 0.05); }

    .hub-recent__summary-note {
      font-size: 13px;
      color: var(--fg-subdued);
      line-height: 1.55;
      padding: 0 12px 14px 12px;
      white-space: pre-wrap;
    }

    .hub-recent__open {
      display: inline-block;
      margin: 0 12px 14px;
      font-family: var(--font-body);
      font-size: 12px;
      font-weight: 600;
      color: var(--accent-primary-dark);
      background: none;
      border: none;
      padding: 0;
      cursor: pointer;
      text-decoration: underline;
    }

    .hub-recent__open:hover { color: var(--fg-on-light); }

    .hub-recent__meta { flex: 1; min-width: 0; }

    .hub-recent__title {
      font-family: var(--font-body);
      font-weight: 600;
      font-size: 15px;
      color: var(--fg-on-light);
      margin-bottom: 4px;
    }

    .hub-recent__note {
      font-size: 13px;
      color: var(--fg-subdued);
      line-height: 1.55;
    }

    .hub-recent__status {
      font-family: var(--font-body);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      padding: 3px 8px;
      background: rgba(104, 227, 190, 0.12);
      color: var(--accent-primary-dark);
      flex-shrink: 0;
      margin-top: 2px;
      white-space: nowrap;
    }

    .hub-recent__status--wip {
      background: rgba(255, 193, 7, 0.12);
      color: #8a6800;
    }

    /* Open questions */
    .hub-questions { margin-bottom: var(--space-6); }

    .hub-ov__section-heading {
      font-family: var(--font-body);
      font-weight: 600;
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--fg-subdued);
      padding-bottom: 8px;
      border-bottom: 1px solid rgba(16, 35, 45, 0.1);
      margin-bottom: 0;
    }

    /* Tab bar */
    .hub-tabs {
      display: flex;
      gap: 0;
      border-bottom: 1px solid var(--color-integrayted);
      background: var(--bg-surface);
      flex-shrink: 0;
      padding: 0 var(--space-5);
    }

    .hub-tab {
      font-family: var(--font-body);
      font-size: 13px;
      font-weight: 500;
      color: var(--fg-subdued);
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      padding: 10px 16px;
      cursor: pointer;
      margin-bottom: -1px;
      transition: color 0.15s, border-color 0.15s;
    }

    .hub-tab:hover { color: var(--fg-on-light); }

    .hub-tab.is-active {
      color: var(--fg-on-light);
      font-weight: 600;
      border-bottom-color: var(--color-high-limit-mint);
    }

    .hub-preview-fallback {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      padding: var(--space-8);
      background: var(--bg-surface);
      text-align: center;
    }

    .hub-preview-fallback.is-visible { display: flex; }

    .hub-preview-fallback p {
      max-width: 32rem;
      font-size: var(--text-body-md-size);
      line-height: var(--text-body-md-lh);
      color: var(--fg-subdued);
    }

    .hub-preview-fallback a {
      display: inline-block;
      margin-top: var(--space-4);
      font-weight: 600;

    function setNavCollapsed(collapsed) {
      hubNav.classList.toggle('is-collapsed', collapsed);
      navToggle.setAttribute('aria-expanded', collapsed ? 'false' : 'true');
      navToggle.setAttribute('aria-label', collapsed ? 'Expand navigation' : 'Collapse navigation');
      navToggle.title = collapsed ? 'Expand navigation' : 'Collapse navigation';
    }

    navToggle.addEventListener('click', () => {
      setNavCollapsed(!hubNav.classList.contains('is-collapsed'));
    });

    function encodePath(path) {
      return path.split('/').map(encodeURIComponent).join('/');
    }

    function createNavLink(item, navLabel) {
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'hub-nav__link';
      btn.dataset.src = item.src;
      btn.dataset.label = navLabel || item.label;
      btn.textContent = item.label;
      btn.addEventListener('click', () => activateLink(btn));
      return btn;
    }

    function allLeafItems(group) {
      const leaves = [];
      group.items.forEach((item) => {
        if (item.subitems) leaves.push(...item.subitems);
        else if (!item.subheading) leaves.push(item);
      });
      return leaves;
    }

    function createSubAccordion(item, parentLabel) {
      const el = document.createElement('div');
      el.className = 'hub-sub-accordion';

      const trigger = document.createElement('button');
      trigger.type = 'button';
      trigger.className = 'hub-sub-accordion__trigger';
      trigger.innerHTML = `
        <span class="hub-sub-accordion__chevron" aria-hidden="true"></span>
        <span>${item.subheading}</span>
      `;
      trigger.addEventListener('click', () => el.classList.toggle('is-open'));

      const panel = document.createElement('div');
      panel.className = 'hub-sub-accordion__panel';
      item.subitems.forEach((subitem) => {
        panel.appendChild(createNavLink(subitem, `${parentLabel} · ${item.subheading} · ${subitem.label}`));
      });

      el.appendChild(trigger);
      el.appendChild(panel);
      return el;
    }

    function createAccordion(id, group) {
      const el = document.createElement('div');
      el.className = 'hub-accordion' + (group.defaultOpen ? ' is-open' : '');
      el.dataset.accordion = id;

      const leafCount = allLeafItems(group).length;
      const trigger = document.createElement('button');
      trigger.type = 'button';
      trigger.className = 'hub-accordion__trigger';
      trigger.setAttribute('aria-expanded', group.defaultOpen ? 'true' : 'false');
      trigger.innerHTML = `
        <span class="hub-accordion__label">${group.label}</span>
        <span class="hub-accordion__count">${leafCount}</span>
        <span class="hub-accordion__chevron" aria-hidden="true"></span>
      `;
      trigger.addEventListener('click', () => {
        const open = el.classList.toggle('is-open');
        trigger.setAttribute('aria-expanded', open ? 'true' : 'false');
      });

      const panel = document.createElement('div');
      panel.className = 'hub-accordion__panel';
      group.items.forEach((item) => {
        if (item.subitems) {
          panel.appendChild(createSubAccordion(item, group.label));
        } else if (item.subheading) {
          const sh = document.createElement('div');
          sh.className = 'hub-accordion__subheading';
          sh.textContent = item.subheading;
          panel.appendChild(sh);
        } else {
          panel.appendChild(createNavLink(item, `${group.label} · ${item.label}`));
        }
      });

      el.appendChild(trigger);
      el.appendChild(panel);
      return el;
    }

    function buildSidebar() {
      overviewBtn = document.createElement('button');
      overviewBtn.type = 'button';
      overviewBtn.className = 'hub-nav__link hub-nav__link--overview is-active';
      overviewBtn.dataset.view = 'overview';
      overviewBtn.textContent = 'Overview';
      overviewBtn.addEventListener('click', () => activateLink(overviewBtn));
      navMount.appendChild(overviewBtn);

      ['sales', 'emails', 'messaging', 'marketing', 'review', 'designSystem', 'source'].forEach((key) => {
        navMount.appendChild(createAccordion(key, NAV_CONFIG[key]));
      });

      navLinks = [...navMount.querySelectorAll('.hub-nav__link[data-src], .hub-nav__link[data-view]')];
    }

    function buildQueueSection(mountId, headingText, items, listClass) {
      const mount = document.getElementById(mountId);
      const heading = document.createElement('h3');
      heading.className = 'hub-ov__section-heading';
      if (mountId === 'hub-priority-queue') {
        heading.style.marginTop = '0';
      } else {
        heading.style.marginTop = 'var(--space-6)';
      }
      heading.textContent = headingText;
      mount.appendChild(heading);

      const list = document.createElement('div');
      list.className = listClass;
      mount.appendChild(list);

      items.forEach((item) => {
        const row = document.createElement('details');
        row.className = 'hub-queue__item';
        const badgeClass = item.priority === 'P1'
          ? 'hub-queue__badge--p1'
          : item.priority === 'P2'
            ? 'hub-queue__badge--p2'
            : 'hub-queue__badge--later';
        row.innerHTML = `
          <summary>
            <span class="hub-queue__badge ${badgeClass}">${item.priority}</span>
            <span class="hub-queue__title">${item.label}</span>
            <span class="hub-queue__status">${item.status}</span>
          </summary>
          <div class="hub-queue__detail">${item.detail}</div>
        `;
        if (item.src) {
          const openBtn = document.createElement('button');
          openBtn.type = 'button';
          openBtn.className = 'hub-queue__open';
          openBtn.textContent = 'Open in preview →';
          openBtn.addEventListener('click', (e) => {
            e.preventDefault();
            loadPreview(item.src, item.label);
            const match = navLinks.find((l) => l.dataset.src === item.src);
            if (match) activateLink(match, false);
          });
          row.querySelector('.hub-queue__detail').appendChild(openBtn);
        }
        list.appendChild(row);
      });
    }

    function buildPriorityQueue() {
      buildQueueSection('hub-priority-queue', 'Priority now', PRIORITY_QUEUE, 'hub-priority');
    }

    function buildPausedWork() {
      buildQueueSection('hub-paused-work', 'Paused / later', PAUSED_WORK, 'hub-paused');
    }

    function buildBacklogPipeline() {
      buildQueueSection('hub-backlog-pipeline', 'Backlog pipeline', BACKLOG_PIPELINE, 'hub-backlog');
    }

    function buildOverview() {
      const mount = document.getElementById('hub-recent-work');

      const heading = document.createElement('h3');
      heading.className = 'hub-ov__section-heading';
      heading.style.marginTop = 'var(--space-6)';
      heading.textContent = 'Recent work';
      mount.appendChild(heading);

      const list = document.createElement('div');
      list.className = 'hub-recent';
      mount.appendChild(list);

      RECENT_WORK.forEach((item) => {
        const wrap = document.createElement('div');
        wrap.className = 'hub-recent__item';

        const details = document.createElement('details');
        const statusClass = item.status === 'WIP' ? ' hub-recent__status--wip' : '';
        details.innerHTML = `
          <summary>
            <div class="hub-recent__meta">
              <div class="hub-recent__title">${item.label}</div>
            </div>
            <span class="hub-recent__status${statusClass}">${item.status}</span>
          </summary>
          <div class="hub-recent__summary-note">${item.note}</div>
        `;

        if (item.src) {
          const openBtn = document.createElement('button');
          openBtn.type = 'button';
          openBtn.className = 'hub-recent__open';
          openBtn.textContent = 'Open in preview →';
          openBtn.addEventListener('click', () => {
            loadPreview(item.src, item.label);
            const match = navLinks.find((l) => l.dataset.src === item.src);
            if (match) activateLink(match, false);
          });
          details.appendChild(openBtn);
        }

        wrap.appendChild(details);
        list.appendChild(wrap);
      });
    }

    function buildOpenQuestions() {
      const mount = document.getElementById('hub-open-questions');
      if (localStorage.getItem(OPEN_QUESTIONS_VERSION_KEY) !== OPEN_QUESTIONS_VERSION) {
        localStorage.setItem(OPEN_QUESTIONS_KEY, OPEN_QUESTIONS_DEFAULT);
        localStorage.setItem(OPEN_QUESTIONS_VERSION_KEY, OPEN_QUESTIONS_VERSION);
      }
      const saved = localStorage.getItem(OPEN_QUESTIONS_KEY) ?? OPEN_QUESTIONS_DEFAULT;

      const heading = document.createElement('h3');
      heading.className = 'hub-ov__section-heading';
      heading.style.marginTop = 'var(--space-6)';
      heading.textContent = 'Scratch notes';
      mount.appendChild(heading);

      const widget = document.createElement('div');
      widget.className = 'hub-questions';

      widget.innerHTML = `
        <div class="hub-session__text" id="questions-text" style="margin-top:12px;${saved ? '' : ' font-style:italic; color:var(--fg-subdued);'}">${saved || 'Freeform — anything not in the sections above.'}</div>
        <textarea class="hub-session__textarea" id="questions-textarea" placeholder="Freeform notes...">${saved}</textarea>
        <div class="hub-session__actions">
          <button class="hub-session__btn" id="questions-edit-btn">Edit</button>
          <button class="hub-session__btn" id="questions-save-btn" style="display:none;">Save</button>
          <button class="hub-session__btn" id="questions-cancel-btn" style="display:none; color:var(--fg-subdued); text-decoration:none;">Cancel</button>
        </div>
      `;
      mount.appendChild(widget);

      const textEl = document.getElementById('questions-text');
      const textarea = document.getElementById('questions-textarea');
      const editBtn = document.getElementById('questions-edit-btn');
      const saveBtn = document.getElementById('questions-save-btn');
      const cancelBtn = document.getElementById('questions-cancel-btn');

      editBtn.addEventListener('click', () => {
        textEl.style.display = 'none';
        textarea.style.display = 'block';
        textarea.focus();
        editBtn.style.display = 'none';
        saveBtn.style.display = '';
        cancelBtn.style.display = '';
      });

      cancelBtn.addEventListener('click', () => {
        textarea.value = localStorage.getItem(OPEN_QUESTIONS_KEY) || '';
        textarea.style.display = 'none';
        textEl.style.display = '';
        editBtn.style.display = '';
        saveBtn.style.display = 'none';
        cancelBtn.style.display = 'none';
      });

      saveBtn.addEventListener('click', () => {
        const val = textarea.value;
        localStorage.setItem(OPEN_QUESTIONS_KEY, val);
        textEl.textContent = val || 'Freeform — anything not in the sections above.';
        textEl.style.fontStyle = val ? '' : 'italic';
        textEl.style.color = val ? '' : 'var(--fg-subdued)';
        textarea.style.display = 'none';
        textEl.style.display = '';
        editBtn.style.display = '';
        saveBtn.style.display = 'none';
        cancelBtn.style.display = 'none';
      });
    }

    function escapeHtml(str) {
      return str
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function renderPickupNote(text) {
      const lines = text.split('\n');
      let html = '';
      let inList = false;

      const closeList = () => {
        if (inList) {
          html += '</ul>';
          inList = false;
        }
      };

      for (const line of lines) {
        const trimmed = line.trim();
        if (!trimmed) {
          closeList();
          continue;
        }
        if (trimmed.startsWith('Goal ')) {
          closeList();
          html += `<p class="hub-pickup__goal">${escapeHtml(trimmed)}</p>`;
        } else if (trimmed.endsWith(':') && !trimmed.startsWith('•')) {
          closeList();
          html += `<h4 class="hub-pickup__heading">${escapeHtml(trimmed.slice(0, -1))}</h4>`;
        } else if (trimmed.startsWith('•')) {
          if (!inList) {
            html += '<ul class="hub-pickup__list">';
            inList = true;
          }
          html += `<li>${escapeHtml(trimmed.slice(1).trim())}</li>`;
        } else {
          closeList();
          html += `<p class="hub-pickup__p">${escapeHtml(trimmed)}</p>`;
        }
      }
      closeList();
      return html;
    }

    function setPickupDisplay(textEl, text) {
      textEl.innerHTML = renderPickupNote(text);
      textEl.style.whiteSpace = 'normal';
    }

    function buildSessionNotes() {
      const mount = document.getElementById('hub-session-notes');

      if (localStorage.getItem(SESSION_NOTE_VERSION_KEY) !== SESSION_NOTE_VERSION) {
        localStorage.setItem(SESSION_NOTE_KEY, SESSION_NOTE_DEFAULT);
        localStorage.setItem(SESSION_NOTE_DATE_KEY, SESSION_NOTE_DEFAULT_DATE);
        localStorage.setItem(SESSION_NOTE_VERSION_KEY, SESSION_NOTE_VERSION);
      }

      const saved = localStorage.getItem(SESSION_NOTE_KEY) ?? SESSION_NOTE_DEFAULT;
      const savedDate = localStorage.getItem(SESSION_NOTE_DATE_KEY) || (localStorage.getItem(SESSION_NOTE_KEY) === null ? SESSION_NOTE_DEFAULT_DATE : '');

      const widget = document.createElement('div');
      widget.className = 'hub-session hub-session--pickup';

      widget.innerHTML = `
        <div class="hub-session__header">
          <span class="hub-session__label">Pick up Monday</span>
          <span class="hub-session__date" id="session-date">${savedDate ? 'Last updated ' + savedDate : ''}</span>
        </div>
        <div class="hub-session__text" id="session-text"></div>
        <textarea class="hub-session__textarea" id="session-textarea" placeholder="Add a note about where you left off today...">${saved}</textarea>
        <div class="hub-session__actions">
          <button class="hub-session__btn" id="session-edit-btn">Edit</button>
          <button class="hub-session__btn" id="session-save-btn" style="display:none;">Save</button>
          <button class="hub-session__btn" id="session-cancel-btn" style="display:none; color:var(--fg-subdued); text-decoration:none;">Cancel</button>
        </div>
      `;

      mount.appendChild(widget);

      const textEl = document.getElementById('session-text');
      setPickupDisplay(textEl, saved);
      const textarea = document.getElementById('session-textarea');
      const dateEl = document.getElementById('session-date');
      const editBtn = document.getElementById('session-edit-btn');
      const saveBtn = document.getElementById('session-save-btn');
      const cancelBtn = document.getElementById('session-cancel-btn');

      editBtn.addEventListener('click', () => {
        textEl.style.display = 'none';
        textarea.style.display = 'block';
        textarea.focus();
        editBtn.style.display = 'none';
        saveBtn.style.display = '';
        cancelBtn.style.display = '';
      });

      cancelBtn.addEventListener('click', () => {
        textarea.value = localStorage.getItem(SESSION_NOTE_KEY) || '';
        textarea.style.display = 'none';
        textEl.style.display = '';
        editBtn.style.display = '';
        saveBtn.style.display = 'none';
        cancelBtn.style.display = 'none';
      });

      saveBtn.addEventListener('click', () => {
        const val = textarea.value;
        const now = new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric', hour: 'numeric', minute: '2-digit' });
        localStorage.setItem(SESSION_NOTE_KEY, val);
        localStorage.setItem(SESSION_NOTE_DATE_KEY, now);
        setPickupDisplay(textEl, val);
        dateEl.textContent = val ? 'Last updated ' + now : '';
        textarea.style.display = 'none';
        textEl.style.display = '';
        editBtn.style.display = '';
        saveBtn.style.display = 'none';
        cancelBtn.style.display = 'none';
      });
    }

    function setActive(link) {
      navLinks.forEach((l) => l.classList.toggle('is-active', l === link));
    }

    function openAccordionForLink(link) {
      // Open parent sub-accordion if nested
      const subAccordion = link.closest('.hub-sub-accordion');
      if (subAccordion) subAccordion.classList.add('is-open');
      // Open parent top-level accordion
      const accordion = link.closest('.hub-accordion');
      if (accordion && !accordion.classList.contains('is-open')) {
        accordion.classList.add('is-open');
        const trigger = accordion.querySelector('.hub-accordion__trigger');
        if (trigger) trigger.setAttribute('aria-expanded', 'true');
      }
    }

    function absolutePreviewUrl(src) {
      return new URL(encodePath(src), window.location.href).href;
    }

    function hidePreviewFallback() {
      previewFallback.classList.remove('is-visible');
      previewFallback.hidden = true;
    }

    function showPreviewFallback(absoluteUrl, label, message) {
      frame.hidden = true;
      frame.removeAttribute('src');
      previewFallbackText.textContent = message;
      previewFallbackOpen.href = absoluteUrl;
      previewFallbackOpen.textContent = 'Open ' + (label || 'preview') + ' in a new tab';
      previewFallback.hidden = false;
      previewFallback.classList.add('is-visible');
    }

    function showOverview() {
      overview.classList.add('is-visible');
      frame.hidden = true;
      frame.removeAttribute('src');
      hidePreviewFallback();
      titleEl.textContent = 'Overview';
      pathEl.textContent = '—';
      openEl.hidden = true;
      setNavCollapsed(false);
      if (reviewPanel) reviewPanel.classList.remove('is-visible');
      document.querySelectorAll('.hub-tab').forEach((t) => {
        t.classList.toggle('is-active', t.dataset.tab === 'overview');
      });
    }

    function loadPreview(src, label) {
      const absolute = absolutePreviewUrl(src);
      overview.classList.remove('is-visible');
      hidePreviewFallback();
      titleEl.textContent = label || src;
      pathEl.textContent = src;
      openEl.href = absolute;
      openEl.hidden = false;
      setNavCollapsed(true);

      if (location.protocol === 'file:') {
        showPreviewFallback(
          absolute,
          label,
          'Preview Hub cannot embed files when opened directly from Finder. Start a local server, then open http://localhost:8765/index.html — or use the link below.'
        );
        return;
      }

      frame.hidden = false;
      frame.onload = () => hidePreviewFallback();
      frame.onerror = () => {
        showPreviewFallback(absolute, label, 'This preview could not load in the pane.');
      };
      frame.src = absolute;
    }

    function activateLink(link, scrollNav = true) {
      setActive(link);
      if (link.dataset.view === 'overview') {
        showOverview();
        return;
      }
      const src = link.dataset.src;
      if (src) {
        loadPreview(src, link.dataset.label || link.textContent.trim());
        openAccordionForLink(link);
        if (scrollNav) link.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
      }
    }

    window.addEventListener('message', (event) => {
      const data = event.data;
      if (!data || data.type !== 'luci-open-url' || typeof data.url !== 'string') return;
      window.open(data.url, '_blank', 'noopener,noreferrer');
    });

    // Tab switching
    const reviewPanel = document.getElementById('hub-review-panel');
    document.getElementById('hub-tabs').addEventListener('click', (e) => {
      const tab = e.target.closest('.hub-tab');
      if (!tab) return;
      document.querySelectorAll('.hub-tab').forEach((t) => t.classList.toggle('is-active', t === tab));
      const which = tab.dataset.tab;
      if (which === 'overview') {
        showOverview();
      } else if (which === 'review') {
        overview.classList.remove('is-visible');
        reviewPanel.classList.add('is-visible');
        frame.hidden = true;
        frame.removeAttribute('src');
        hidePreviewFallback();
        titleEl.textContent = 'Review queue';
        pathEl.textContent = 'ui_kits/review/stakeholder-review.html';
        openEl.href = absolutePreviewUrl('ui_kits/review/stakeholder-review.html');
        openEl.hidden = false;
      }
    });

    buildSidebar();
    buildSessionNotes();
    buildPriorityQueue();
    buildPausedWork();
    buildBacklogPipeline();
    buildOverview();
    buildOpenQuestions();
  </script>
</body>
</html>
