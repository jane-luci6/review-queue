<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480" width="900" height="480" font-family="'Space Grotesk', 'Trebuchet MS', sans-serif" role="img" aria-label="The Embedded Operation: one accountable team surrounded by six services on a ring.">
  <title>LUCI - The Embedded Operation (orbit)</title>

  <!-- Ring, broken with clean gaps at each of the six nodes -->
  <g fill="none" stroke="#68E3BE" stroke-width="1.5" stroke-opacity="0.85" stroke-linecap="round">
    <path d="M645.1,267.4 A197,197 0 0 1 571.3,395.2"/>
    <path d="M523.8,422.7 A197,197 0 0 1 376.2,422.7"/>
    <path d="M328.7,395.2 A197,197 0 0 1 254.9,267.4"/>
    <path d="M254.9,212.6 A197,197 0 0 1 328.7,84.8"/>
    <path d="M376.2,57.3 A197,197 0 0 1 523.8,57.3"/>
    <path d="M571.3,84.8 A197,197 0 0 1 645.1,212.6"/>
  </g>

  <!-- Hub -->
  <circle cx="450" cy="240" r="96" fill="#10232D"/>
  <text x="450" y="233" text-anchor="middle" fill="#F5F8FA" font-size="15" font-weight="700">One accountable</text>
  <text x="450" y="251" text-anchor="middle" fill="#F5F8FA" font-size="15" font-weight="700">team</text>
  <text x="450" y="272" text-anchor="middle" fill="#68E3BE" font-size="11" letter-spacing="0.4">day one &#8594; year five+</text>

  <!-- ============ NODES ============ -->

  <!-- FDE - top-left icon (351.5,69.5) -->
  <rect x="332.5" y="50.5" width="38" height="38" rx="9" fill="#10232D"/>
  <g transform="translate(341.5,59.5) scale(0.8333)" fill="none" stroke="#68E3BE" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <rect x="4" y="4" width="16" height="16" rx="2"/><rect x="9" y="9" width="6" height="6"/><line x1="9" y1="1" x2="9" y2="4"/><line x1="15" y1="1" x2="15" y2="4"/><line x1="9" y1="20" x2="9" y2="23"/><line x1="15" y1="20" x2="15" y2="23"/><line x1="20" y1="9" x2="23" y2="9"/><line x1="20" y1="14" x2="23" y2="14"/><line x1="1" y1="9" x2="4" y2="9"/><line x1="1" y1="14" x2="4" y2="14"/>
  </g>
  <text x="313.5" y="57.5" text-anchor="end" fill="#1C2B33" font-size="14" font-weight="700">LUCI FDE</text>
  <text x="313.5" y="74.5" text-anchor="end" fill="#354F5C" font-size="12">Embedded full-stack</text>
  <text x="313.5" y="89.5" text-anchor="end" fill="#354F5C" font-size="12">engineers.</text>

  <!-- Design & Deployment - top-right icon (548.5,69.5) -->
  <rect x="529.5" y="50.5" width="38" height="38" rx="9" fill="#10232D"/>
  <g transform="translate(538.5,59.5) scale(0.8333)" fill="none" stroke="#68E3BE" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/>
  </g>
  <text x="586.5" y="57.5" text-anchor="start" fill="#1C2B33" font-size="14" font-weight="700">Design &amp; Deployment</text>
  <text x="586.5" y="74.5" text-anchor="start" fill="#354F5C" font-size="12">Architected up front</text>
  <text x="586.5" y="89.5" text-anchor="start" fill="#354F5C" font-size="12">so value lands early.</text>

  <!-- Support & Operations - right icon (647,240) -->
  <rect x="628" y="221" width="38" height="38" rx="9" fill="#10232D"/>
  <g transform="translate(637,230) scale(0.8333)" fill="none" stroke="#68E3BE" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="4"/><line x1="4.93" y1="4.93" x2="9.17" y2="9.17"/><line x1="14.83" y1="14.83" x2="19.07" y2="19.07"/><line x1="14.83" y1="9.17" x2="19.07" y2="4.93"/><line x1="4.93" y1="19.07" x2="9.17" y2="14.83"/>
  </g>
  <text x="685" y="216" text-anchor="start" fill="#1C2B33" font-size="14" font-weight="700">Support &amp;</text>
  <text x="685" y="232" text-anchor="start" fill="#1C2B33" font-size="14" font-weight="700">Operations</text>
  <text x="685" y="249" text-anchor="start" fill="#354F5C" font-size="12">Monitoring and</text>
  <text x="685" y="264" text-anchor="start" fill="#354F5C" font-size="12">resolution at any hour.</text>

  <!-- Continuous Refinement - bottom-right icon (548.5,410.5) -->
  <rect x="529.5" y="391.5" width="38" height="38" rx="9" fill="#10232D"/>
  <g transform="translate(538.5,400.5) scale(0.8333)" fill="none" stroke="#68E3BE" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
  </g>
  <text x="586.5" y="398.5" text-anchor="start" fill="#1C2B33" font-size="14" font-weight="700">Continuous Refinement</text>
  <text x="586.5" y="415.5" text-anchor="start" fill="#354F5C" font-size="12">LUCI is more capable in</text>
  <text x="586.5" y="430.5" text-anchor="start" fill="#354F5C" font-size="12">year five than day one.</text>

  <!-- Training & Enablement - bottom-left icon (351.5,410.5) -->
  <rect x="332.5" y="391.5" width="38" height="38" rx="9" fill="#10232D"/>
  <g transform="translate(341.5,400.5) scale(0.8333)" fill="none" stroke="#68E3BE" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
  </g>
  <text x="313.5" y="398.5" text-anchor="end" fill="#1C2B33" font-size="14" font-weight="700">Training &amp; Enablement</text>
  <text x="313.5" y="415.5" text-anchor="end" fill="#354F5C" font-size="12">Structured training that</text>
  <text x="313.5" y="430.5" text-anchor="end" fill="#354F5C" font-size="12">builds LUCI fluency.</text>

  <!-- Owner's-Rep Partnership - left icon (253,240) -->
  <rect x="234" y="221" width="38" height="38" rx="9" fill="#10232D"/>
  <g transform="translate(243,230) scale(0.8333)" fill="none" stroke="#68E3BE" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/>
  </g>
  <text x="215" y="216" text-anchor="end" fill="#1C2B33" font-size="14" font-weight="700">Owner&#8217;s-Rep</text>
  <text x="215" y="232" text-anchor="end" fill="#1C2B33" font-size="14" font-weight="700">Partnership</text>
  <text x="215" y="249" text-anchor="end" fill="#354F5C" font-size="12">Accountability as a</text>
  <text x="215" y="264" text-anchor="end" fill="#354F5C" font-size="12">member of your team.</text>
</svg>
