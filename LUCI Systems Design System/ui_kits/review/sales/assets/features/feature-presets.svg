<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180" role="img" aria-label="Saved scenes scheduled across a day, from morning to night, on a timeline">
  <defs>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="5" stdDeviation="6" flood-color="#10232D" flood-opacity="0.16"/>
    </filter>
    <linearGradient id="morning" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#F2D89A"/><stop offset="1" stop-color="#EDD086"/></linearGradient>
    <linearGradient id="midday" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#CDEBDF"/><stop offset="1" stop-color="#A9DEC9"/></linearGradient>
    <linearGradient id="evening" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#7FE6C6"/><stop offset="1" stop-color="#4FB59A"/></linearGradient>
    <linearGradient id="night" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#234C5C"/><stop offset="1" stop-color="#0E222C"/></linearGradient>
    <linearGradient id="day" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#EDD086" stop-opacity="0.22"/>
      <stop offset="0.45" stop-color="#A9DEC9" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#10232D" stop-opacity="0.22"/>
    </linearGradient>
  </defs>
  <rect width="320" height="180" fill="#EFF3F5"/>
  <rect x="20" y="40" width="280" height="98" rx="12" fill="url(#day)"/>
  <!-- clock badge -->
  <circle cx="42" cy="28" r="13" fill="#FFFFFF" filter="url(#soft)"/>
  <circle cx="42" cy="28" r="13" fill="none" stroke="#10232D" stroke-width="1.6"/>
  <path d="M42 28V20M42 28l6 3" fill="none" stroke="#176B54" stroke-width="1.8" stroke-linecap="round"/>
  <circle cx="42" cy="28" r="1.6" fill="#10232D"/>
  <!-- scene cards -->
  <g filter="url(#soft)">
    <rect x="36" y="50" width="56" height="74" rx="9" fill="#FFFFFF"/>
    <path d="M36 59a9 9 0 0 1 9-9h38a9 9 0 0 1 9 9v18H36z" fill="url(#morning)"/>
    <circle cx="64" cy="65" r="7" fill="#FFFFFF" opacity="0.85"/>
    <rect x="46" y="88" width="36" height="4.5" rx="2.2" fill="#10232D"/><rect x="46" y="98" width="24" height="3.6" rx="1.8" fill="#10232D" opacity="0.4"/>
  </g>
  <g filter="url(#soft)">
    <rect x="100" y="50" width="56" height="74" rx="9" fill="#FFFFFF"/>
    <path d="M100 59a9 9 0 0 1 9-9h38a9 9 0 0 1 9 9v18h-56z" fill="url(#midday)"/>
    <circle cx="128" cy="65" r="7" fill="#FFFFFF" opacity="0.9"/><g stroke="#FFFFFF" stroke-width="1.4" opacity="0.9"><line x1="128" y1="54" x2="128" y2="50.5"/><line x1="128" y1="76" x2="128" y2="79.5"/><line x1="117" y1="65" x2="113.5" y2="65"/><line x1="139" y1="65" x2="142.5" y2="65"/></g>
    <rect x="110" y="88" width="36" height="4.5" rx="2.2" fill="#10232D"/><rect x="110" y="98" width="24" height="3.6" rx="1.8" fill="#10232D" opacity="0.4"/>
  </g>
  <g filter="url(#soft)">
    <rect x="164" y="50" width="56" height="74" rx="9" fill="#FFFFFF"/>
    <path d="M164 59a9 9 0 0 1 9-9h38a9 9 0 0 1 9 9v18h-56z" fill="url(#evening)"/>
    <path d="M178 70a14 14 0 0 1 28 0z" fill="#FFFFFF" opacity="0.85"/>
    <rect x="174" y="88" width="36" height="4.5" rx="2.2" fill="#10232D"/><rect x="174" y="98" width="24" height="3.6" rx="1.8" fill="#10232D" opacity="0.4"/>
  </g>
  <g filter="url(#soft)">
    <rect x="228" y="50" width="56" height="74" rx="9" fill="#FFFFFF"/>
    <path d="M228 59a9 9 0 0 1 9-9h38a9 9 0 0 1 9 9v18h-56z" fill="url(#night)"/>
    <path d="M261 58a7 7 0 1 0 0 14 8.5 8.5 0 0 1 0-14z" fill="#EDD086"/>
    <circle cx="248" cy="60" r="0.9" fill="#FFFFFF"/><circle cx="270" cy="68" r="0.9" fill="#FFFFFF"/><circle cx="244" cy="68" r="0.7" fill="#FFFFFF"/>
    <rect x="238" y="88" width="36" height="4.5" rx="2.2" fill="#10232D"/><rect x="238" y="98" width="24" height="3.6" rx="1.8" fill="#10232D" opacity="0.4"/>
  </g>
  <!-- timeline -->
  <rect x="36" y="148" width="248" height="4" rx="2" fill="#10232D" opacity="0.22"/>
  <g fill="#68E3BE"><circle cx="64" cy="150" r="3.2"/><circle cx="128" cy="150" r="3.2"/><circle cx="192" cy="150" r="3.2"/><circle cx="256" cy="150" r="3.2"/></g>
  <line x1="128" y1="140" x2="128" y2="160" stroke="#176B54" stroke-width="2"/><circle cx="128" cy="138" r="3.4" fill="#176B54"/>
</svg>
