<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180" role="img" aria-label="An incoming event triggering coordinated responses across multiple displays">
  <defs>
    <linearGradient id="node" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1A4150"/>
      <stop offset="1" stop-color="#0B1D26"/>
    </linearGradient>
    <linearGradient id="lit" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#8FEBD0"/>
      <stop offset="1" stop-color="#4FB59A"/>
    </linearGradient>
    <radialGradient id="spark" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#EDD086" stop-opacity="0.7"/>
      <stop offset="1" stop-color="#EDD086" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="5" stdDeviation="6" flood-color="#0B1D26" flood-opacity="0.20"/>
    </filter>
  </defs>
  <rect width="320" height="180" fill="#EFF3F5"/>
  <!-- incoming event arcs -->
  <g fill="none" stroke="#EDD086" stroke-width="2" stroke-linecap="round" opacity="0.75">
    <path d="M14 78a16 16 0 0 1 0 24"/><path d="M22 84a8 8 0 0 1 0 12"/>
  </g>
  <!-- trigger node -->
  <circle cx="54" cy="90" r="30" fill="url(#spark)"/>
  <rect x="32" y="68" width="44" height="44" rx="12" fill="url(#node)" filter="url(#soft)"/>
  <polygon points="58,74 44,93 53,93 49,108 64,87 55,87" fill="#EDD086"/>
  <!-- flow trigger -> core -->
  <line x1="78" y1="90" x2="120" y2="90" stroke="#176B54" stroke-width="2.4"/>
  <polygon points="120,85 130,90 120,95" fill="#176B54"/>
  <!-- LUCI core -->
  <rect x="132" y="70" width="42" height="40" rx="10" fill="url(#node)" filter="url(#soft)"/>
  <circle cx="153" cy="90" r="11" fill="none" stroke="#68E3BE" stroke-width="2"/>
  <circle cx="153" cy="90" r="3" fill="#68E3BE"/>
  <!-- branches core -> screens -->
  <g fill="none" stroke="#68E3BE" stroke-width="2.2">
    <path d="M174 84 C 200 70, 212 58, 230 50"/>
    <path d="M176 90 H 228"/>
    <path d="M174 96 C 200 110, 212 122, 230 130"/>
  </g>
  <g fill="#68E3BE"><polygon points="228,46 238,48 230,55"/><polygon points="228,86 238,90 228,94"/><polygon points="228,126 238,131 230,134"/></g>
  <!-- lit screens -->
  <g filter="url(#soft)">
    <rect x="238" y="30" width="54" height="36" rx="6" fill="#10232D"/>
    <rect x="242" y="34" width="46" height="24" rx="3" fill="url(#lit)"/>
    <rect x="256" y="66" width="18" height="3" rx="1.5" fill="#10232D"/>
    <polygon points="261,41 261,51 270,46" fill="#0B1D26" opacity="0.65"/>
  </g>
  <g filter="url(#soft)">
    <rect x="238" y="72" width="54" height="36" rx="6" fill="#10232D"/>
    <rect x="242" y="76" width="46" height="24" rx="3" fill="url(#lit)"/>
    <rect x="256" y="108" width="18" height="3" rx="1.5" fill="#10232D"/>
    <polygon points="261,83 261,93 270,88" fill="#0B1D26" opacity="0.65"/>
  </g>
  <g filter="url(#soft)">
    <rect x="238" y="114" width="54" height="36" rx="6" fill="#10232D"/>
    <rect x="242" y="118" width="46" height="24" rx="3" fill="url(#lit)"/>
    <rect x="256" y="150" width="18" height="3" rx="1.5" fill="#10232D"/>
    <polygon points="261,125 261,135 270,130" fill="#0B1D26" opacity="0.65"/>
  </g>
</svg>
