<svg xmlns="http://www.w3.org/2000/svg" width="640" height="920" viewBox="0 0 640 920" role="img">
  <title>Casino floormap icon options - AutoCAD style</title>
  <desc>Two variants per element for Standard AV disk: Audio Zone, Screen endpoint, Rack/Head end, Vendor, Computer, Video Wall.</desc>

  <defs>
    <style>
      .cad { fill: none; stroke: #7ba8c4; stroke-width: 1.25; stroke-linecap: square; stroke-linejoin: miter; }
      .cad-thin { fill: none; stroke: #7ba8c4; stroke-width: 0.85; stroke-linecap: square; }
      .cad-dash { fill: none; stroke: #7ba8c4; stroke-width: 1; stroke-dasharray: 4,3; }
      .cad-hatch { fill: none; stroke: #7ba8c4; stroke-width: 0.6; opacity: 0.55; }
      .lbl { fill: #9aabb8; font-family: Helvetica, Arial, sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 0.06em; }
      .sub { fill: #7a8f9e; font-family: Helvetica, Arial, sans-serif; font-size: 10px; }
      .tag { fill: #5a7080; font-family: Helvetica, Arial, sans-serif; font-size: 9px; font-weight: 700; letter-spacing: 0.12em; }
      .rule { stroke: rgba(255,255,255,0.1); stroke-width: 1; }
    </style>
  </defs>

  <text class="lbl" x="32" y="36">AUDIO ZONE</text>
  <text class="sub" x="32" y="52">Zone boundary + coverage symbol</text>
  <line class="rule" x1="32" y1="64" x2="608" y2="64"/>

  <text class="tag" x="32" y="88">A</text>
  <g class="cad" transform="translate(48, 72)">
    <ellipse cx="36" cy="28" rx="34" ry="22" stroke-dasharray="5,4"/>
    <circle cx="36" cy="28" r="5"/>
    <path d="M36,23 L36,18 M31,28 L24,28 M41,28 L48,28"/>
    <path d="M28,20 Q36,10 44,20" class="cad-thin"/>
    <path d="M24,24 Q36,12 48,24" class="cad-thin"/>
  </g>
  <text class="sub" x="32" y="138">Dashed zone ellipse, speaker node, wave arcs</text>

  <text class="tag" x="340" y="88">B</text>
  <g transform="translate(356, 72)">
    <rect class="cad-dash" x="0" y="0" width="72" height="48"/>
    <line class="cad-hatch" x1="6" y1="42" x2="66" y2="6"/>
    <line class="cad-hatch" x1="6" y1="36" x2="60" y2="6"/>
    <line class="cad-hatch" x1="6" y1="30" x2="54" y2="6"/>
    <circle class="cad" cx="18" cy="36" r="4"/>
    <circle class="cad" cx="54" cy="36" r="4"/>
    <path class="cad-thin" d="M18,32 L18,26 M54,32 L54,26"/>
  </g>
  <text class="sub" x="340" y="138">Dashed rect, diagonal hatch, corner speakers</text>

  <line class="rule" x1="32" y1="156" x2="608" y2="156"/>

  <text class="lbl" x="32" y="188">SCREEN ENDPOINT</text>
  <text class="sub" x="32" y="204">Display / player termination on floor</text>
  <line class="rule" x1="32" y1="216" x2="608" y2="216"/>

  <text class="tag" x="32" y="240">A</text>
  <g class="cad" transform="translate(48, 224)">
    <rect x="4" y="4" width="48" height="30"/>
    <line x1="4" y1="4" x2="52" y2="34"/>
    <line x1="52" y1="4" x2="4" y2="34"/>
    <line x1="28" y1="34" x2="28" y2="42"/>
    <line x1="18" y1="42" x2="38" y2="42"/>
  </g>
  <text class="sub" x="32" y="290">Monitor rect, X overlay, floor stand tick</text>

  <text class="tag" x="340" y="240">B</text>
  <g class="cad" transform="translate(356, 224)">
    <circle cx="28" cy="24" r="20"/>
    <line x1="28" y1="4" x2="28" y2="44"/>
    <line x1="8" y1="24" x2="48" y2="24"/>
    <rect x="22" y="38" width="12" height="6"/>
  </g>
  <text class="sub" x="340" y="290">Crosshair endpoint, mount block (plan view)</text>

  <line class="rule" x1="32" y1="308" x2="608" y2="308"/>

  <text class="lbl" x="32" y="340">RACK / HEAD END</text>
  <text class="sub" x="32" y="356">Central equipment / MDF-IDF elevation</text>
  <line class="rule" x1="32" y1="368" x2="608" y2="368"/>

  <text class="tag" x="32" y="392">A</text>
  <g class="cad" transform="translate(48, 376)">
    <rect x="18" y="0" width="20" height="52"/>
    <line x1="18" y1="10" x2="38" y2="10"/>
    <line x1="18" y1="20" x2="38" y2="20"/>
    <line x1="18" y1="30" x2="38" y2="30"/>
    <line x1="18" y1="40" x2="38" y2="40"/>
    <circle cx="21" cy="6" r="1.5" fill="#7ba8c4" stroke="none"/>
    <circle cx="21" cy="16" r="1.5" fill="#7ba8c4" stroke="none"/>
    <circle cx="21" cy="26" r="1.5" fill="#7ba8c4" stroke="none"/>
  </g>
  <text class="sub" x="32" y="448">EIA rack elevation, shelf lines, status lamps</text>

  <text class="tag" x="340" y="392">B</text>
  <g class="cad" transform="translate(356, 376)">
    <line x1="16" y1="0" x2="16" y2="52"/>
    <line x1="40" y1="0" x2="40" y2="52"/>
    <line x1="16" y1="0" x2="40" y2="0"/>
    <line x1="16" y1="52" x2="40" y2="52"/>
    <path d="M20,12 L36,12 L36,18 L20,18 Z"/>
    <path d="M20,24 L36,24 L36,30 L20,30 Z"/>
    <path d="M20,36 L36,36 L36,42 L20,42 Z"/>
  </g>
  <text class="sub" x="340" y="448">Cabinet outline, U-slot blocks (CAD block style)</text>

  <line class="rule" x1="32" y1="466" x2="608" y2="466"/>

  <text class="lbl" x="32" y="498">VENDOR</text>
  <text class="sub" x="32" y="514">Third-party system / manufacturer tag</text>
  <line class="rule" x1="32" y1="526" x2="608" y2="526"/>

  <text class="tag" x="32" y="550">A</text>
  <g class="cad" transform="translate(48, 534)">
    <polygon points="28,4 48,14 28,24 8,14"/>
    <circle cx="28" cy="14" r="3"/>
    <line x1="48" y1="14" x2="58" y2="14"/>
    <line x1="58" y1="14" x2="58" y2="38"/>
    <rect x="52" y="38" width="24" height="12"/>
  </g>
  <text class="sub" x="32" y="606">Diamond block ref, leader line, label box</text>

  <text class="tag" x="340" y="550">B</text>
  <g class="cad" transform="translate(356, 534)">
    <path d="M0,8 L36,8 L44,16 L36,24 L0,24 Z"/>
    <circle cx="8" cy="16" r="3"/>
    <line x1="44" y1="16" x2="56" y2="16"/>
    <text fill="#7ba8c4" font-family="Helvetica, Arial, sans-serif" font-size="8" x="4" y="18">VND</text>
  </g>
  <text class="sub" x="340" y="606">Equipment flag tag, pin, short annotation</text>

  <line class="rule" x1="32" y1="624" x2="608" y2="624"/>

  <text class="lbl" x="32" y="656">COMPUTER</text>
  <text class="sub" x="32" y="672">Workstation / player PC on floor</text>
  <line class="rule" x1="32" y1="684" x2="608" y2="684"/>

  <text class="tag" x="32" y="708">A</text>
  <g class="cad" transform="translate(48, 692)">
    <rect x="0" y="0" width="34" height="24"/>
    <line x1="0" y1="18" x2="34" y2="18"/>
    <rect x="10" y="24" width="14" height="4"/>
    <line x1="6" y1="28" x2="28" y2="28"/>
  </g>
  <text class="sub" x="32" y="764">Monitor plan, keyboard shelf line, desk tick</text>

  <text class="tag" x="340" y="708">B</text>
  <g class="cad" transform="translate(356, 692)">
    <rect x="0" y="8" width="14" height="28"/>
    <line x1="3" y1="12" x2="11" y2="12"/>
    <line x1="3" y1="16" x2="11" y2="16"/>
    <rect x="20" y="0" width="30" height="22"/>
    <line x1="20" y1="16" x2="50" y2="16"/>
    <rect x="28" y="22" width="14" height="3"/>
  </g>
  <text class="sub" x="340" y="764">Tower + monitor elevation (common CAD pair)</text>

  <line class="rule" x1="32" y1="782" x2="608" y2="782"/>

  <text class="lbl" x="32" y="814">VIDEO WALL</text>
  <text class="sub" x="32" y="830">Large-format tiled display plane</text>
  <line class="rule" x1="32" y1="842" x2="608" y2="842"/>

  <text class="tag" x="32" y="866">A</text>
  <g class="cad" transform="translate(48, 850)">
    <rect x="0" y="8" width="80" height="36"/>
    <line x1="20" y1="8" x2="20" y2="44"/>
    <line x1="40" y1="8" x2="40" y2="44"/>
    <line x1="60" y1="8" x2="60" y2="44"/>
    <line x1="0" y1="20" x2="80" y2="20"/>
    <line x1="0" y1="32" x2="80" y2="32"/>
  </g>
  <text class="sub" x="32" y="912">Tile grid, mullion lines (plan)</text>

  <text class="tag" x="340" y="866">B</text>
  <g class="cad" transform="translate(356, 850)">
    <rect x="0" y="12" width="88" height="28"/>
    <line x1="0" y1="12" x2="88" y2="40"/>
    <line x1="88" y1="12" x2="0" y2="40"/>
    <line x1="22" y1="12" x2="22" y2="40"/>
    <line x1="44" y1="12" x2="44" y2="40"/>
    <line x1="66" y1="12" x2="66" y2="40"/>
  </g>
  <text class="sub" x="340" y="912">Wide plane, diagonal brace, vertical seams</text>

</svg>
