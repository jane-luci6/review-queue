<svg xmlns="http://www.w3.org/2000/svg" width="560" height="560" viewBox="0 0 560 560" role="img">
  <title>Standard AV flat top-down working canvas</title>
  <desc>Top-down disk: spaced icon slots, vendor labels on rim, clean edge-terminated cables.</desc>

  <defs>
    <clipPath id="disk-flat">
      <circle cx="280" cy="280" r="238"/>
    </clipPath>
    <path id="rim-label" d="M 72,323 A 208,208 0 0,0 488,323" fill="none"/>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&amp;display=swap');
      .vendor-tag {
        font-family: 'Space Grotesk', 'Trebuchet MS', sans-serif;
        font-size: 12px;
        font-weight: 600;
        letter-spacing: 0.04em;
        fill: #e8f4fc;
      }
    </style>
  </defs>

  <circle cx="280" cy="280" r="248" fill="#2f4254"/>
  <circle cx="280" cy="280" r="248" fill="none" stroke="#7d94a8" stroke-width="2"/>

  <g clip-path="url(#disk-flat)">

    <!-- CABLES (under icons — 1–2 per icon, orthogonal, terminate on icon edges) -->
    <g fill="none" stroke="#6a92aa" stroke-width="1.2" stroke-linecap="square" stroke-linejoin="miter" opacity="0.52">
      <!-- center rack (2): top video wall, secondary rack -->
      <path d="M 280,114 L 280,126 L 250,126 L 250,224 L 288,224 L 288,240"/>
      <path d="M 288,336 L 288,358 L 232,358 L 232,368 L 234,368"/>
      <!-- inner-left screen (2): left video wall, lower-left speaker -->
      <path d="M 161,286 L 72,293 L 72,318 L 81,318"/>
      <path d="M 185,312 L 185,328 L 148,328 L 148,338"/>
      <!-- decoder -->
      <path d="M 385,300 L 385,318 L 358,318 L 358,348 L 320,348"/>
      <path d="M 408,272 L 450,272 L 450,299 L 456,299"/>
      <!-- switch + secondary rack -->
      <path d="M 253,428 L 280,428 L 286,407 L 352,407"/>
      <path d="M 416,407 L 416,436 L 448,436 L 448,462"/>
      <!-- side video walls -->
      <path d="M 104,299 L 118,299 L 118,420 L 130,420"/>
      <path d="M 456,299 L 440,299 L 440,446 L 472,446"/>
      <!-- corner screens + computers + speakers -->
      <path d="M 178,152 L 120,152 L 120,200"/>
      <path d="M 154,168 L 154,178 L 212,178 L 212,188"/>
      <path d="M 382,152 L 412,152 L 412,200"/>
      <path d="M 406,168 L 406,178 L 306,178 L 306,188"/>
      <path d="M 154,404 L 140,404 L 140,338 L 166,338"/>
    </g>

    <g fill="none" stroke="#9ec8e4" stroke-width="1.6" stroke-linecap="square" stroke-linejoin="miter">

      <!-- CENTER: Rack A -->
      <g transform="translate(264, 240)">
        <rect x="0" y="0" width="48" height="96"/>
        <line x1="0" y1="18" x2="48" y2="18"/>
        <line x1="0" y1="36" x2="48" y2="36"/>
        <line x1="0" y1="54" x2="48" y2="54"/>
        <line x1="0" y1="72" x2="48" y2="72"/>
        <circle cx="7" cy="11" r="2.5" fill="#9ec8e4" stroke="none"/>
        <circle cx="7" cy="29" r="2.5" fill="#9ec8e4" stroke="none"/>
        <circle cx="7" cy="47" r="2.5" fill="#9ec8e4" stroke="none"/>
      </g>

      <!-- INNER LEFT: screen A (left of rack) -->
      <g transform="translate(161, 270)">
        <rect x="0" y="0" width="48" height="32"/>
        <line x1="0" y1="0" x2="48" y2="32"/>
        <line x1="48" y1="0" x2="0" y2="32"/>
        <line x1="24" y1="32" x2="24" y2="42"/>
      </g>

      <!-- INNER: Decoder (right of rack) -->
      <g transform="translate(362, 272)">
        <rect x="0" y="0" width="46" height="28"/>
        <rect x="5" y="4" width="36" height="20"/>
        <circle cx="39" cy="8" r="2" fill="#b8926a" stroke="none"/>
      </g>

      <!-- INNER LOWER: switch -->
      <g transform="translate(352, 396)">
        <rect x="0" y="0" width="64" height="22"/>
        <rect x="5" y="6" width="6" height="10" fill="#5a8aa8" stroke="none"/>
        <rect x="16" y="6" width="6" height="10" fill="#5a8aa8" stroke="none"/>
        <rect x="27" y="6" width="6" height="10" fill="#5a8aa8" stroke="none"/>
        <rect x="38" y="6" width="6" height="10" fill="#5a8aa8" stroke="none"/>
        <rect x="49" y="6" width="6" height="10" fill="#5a8aa8" stroke="none"/>
      </g>

      <!-- TOP: Video wall A (3 tile rows) -->
      <g transform="translate(214, 78)">
        <rect x="0" y="0" width="132" height="36"/>
        <line x1="33" y1="0" x2="33" y2="36"/>
        <line x1="66" y1="0" x2="66" y2="36"/>
        <line x1="99" y1="0" x2="99" y2="36"/>
        <line x1="0" y1="12" x2="132" y2="12"/>
        <line x1="0" y1="24" x2="132" y2="24"/>
      </g>

      <!-- LEFT: Video wall A (3 tile rows) -->
      <g transform="translate(58, 280)">
        <rect x="0" y="0" width="46" height="38"/>
        <line x1="12" y1="0" x2="12" y2="38"/>
        <line x1="24" y1="0" x2="24" y2="38"/>
        <line x1="36" y1="0" x2="36" y2="38"/>
        <line x1="0" y1="13" x2="46" y2="13"/>
        <line x1="0" y1="26" x2="46" y2="26"/>
      </g>

      <!-- RIGHT: Video wall A (3 tile rows) -->
      <g transform="translate(456, 280)">
        <rect x="0" y="0" width="46" height="38"/>
        <line x1="12" y1="0" x2="12" y2="38"/>
        <line x1="24" y1="0" x2="24" y2="38"/>
        <line x1="36" y1="0" x2="36" y2="38"/>
        <line x1="0" y1="13" x2="46" y2="13"/>
        <line x1="0" y1="26" x2="46" y2="26"/>
      </g>

      <!-- BOTTOM CENTER: secondary rack (nudged up-left to clear STANDARD AV rim) -->
      <g transform="translate(215, 368)">
        <rect x="0" y="0" width="38" height="72"/>
        <line x1="0" y1="16" x2="38" y2="16"/>
        <line x1="0" y1="32" x2="38" y2="32"/>
        <line x1="0" y1="48" x2="38" y2="48"/>
        <circle cx="6" cy="9" r="2" fill="#9ec8e4" stroke="none"/>
      </g>

      <!-- CORNER SCREENS A -->
      <g transform="translate(130, 136)">
        <rect x="0" y="0" width="48" height="32"/>
        <line x1="0" y1="0" x2="48" y2="32"/>
        <line x1="48" y1="0" x2="0" y2="32"/>
        <line x1="24" y1="32" x2="24" y2="42"/>
        <line x1="12" y1="42" x2="36" y2="42"/>
      </g>
      <g transform="translate(382, 136)">
        <rect x="0" y="0" width="48" height="32"/>
        <line x1="0" y1="0" x2="48" y2="32"/>
        <line x1="48" y1="0" x2="0" y2="32"/>
        <line x1="24" y1="32" x2="24" y2="42"/>
      </g>
      <g transform="translate(130, 404)">
        <rect x="0" y="0" width="48" height="32"/>
        <line x1="0" y1="0" x2="48" y2="32"/>
        <line x1="48" y1="0" x2="0" y2="32"/>
        <line x1="24" y1="32" x2="24" y2="42"/>
      </g>
      <g transform="translate(424, 430)">
        <rect x="0" y="0" width="48" height="32"/>
        <line x1="0" y1="0" x2="48" y2="32"/>
        <line x1="48" y1="0" x2="0" y2="32"/>
        <line x1="24" y1="32" x2="24" y2="42"/>
      </g>

      <!-- SPEAKERS (mid-upper / mid-lower, clear of rack + inner icons) -->
      <g transform="translate(196, 188)">
        <rect x="0" y="5" width="8" height="16"/>
        <path d="M8,1 L8,25 L20,29 L20,0 Z"/>
        <path d="M24,7 Q30,15 24,23"/>
        <path d="M28,3 Q38,15 28,27"/>
      </g>
      <g transform="translate(292, 188)">
        <rect x="0" y="5" width="8" height="16"/>
        <path d="M8,1 L8,25 L20,29 L20,0 Z"/>
        <path d="M24,7 Q30,15 24,23"/>
        <path d="M28,3 Q38,15 28,27"/>
      </g>
      <g transform="translate(148, 338)">
        <rect x="0" y="5" width="8" height="16"/>
        <path d="M8,1 L8,25 L20,29 L20,0 Z"/>
        <path d="M24,7 Q30,15 24,23"/>
        <path d="M28,3 Q38,15 28,27"/>
      </g>
      <g transform="translate(320, 348)">
        <rect x="0" y="5" width="8" height="16"/>
        <path d="M8,1 L8,25 L20,29 L20,0 Z"/>
        <path d="M24,7 Q30,15 24,23"/>
        <path d="M28,3 Q38,15 28,27"/>
      </g>

      <!-- COMPUTERS B (above side video walls) -->
      <g transform="translate(68, 186)">
        <rect x="0" y="8" width="12" height="38"/>
        <line x1="3" y1="15" x2="9" y2="15"/>
        <rect x="16" y="0" width="36" height="28"/>
        <line x1="16" y1="16" x2="52" y2="16"/>
        <rect x="26" y="28" width="12" height="4"/>
      </g>
      <g transform="translate(412, 186)">
        <rect x="0" y="8" width="12" height="38"/>
        <line x1="3" y1="15" x2="9" y2="15"/>
        <rect x="16" y="0" width="36" height="28"/>
        <line x1="16" y1="16" x2="52" y2="16"/>
        <rect x="26" y="28" width="12" height="4"/>
      </g>

    </g>

    <!-- VENDOR TAGS (dedicated rim slots, Space Grotesk) -->
    <g fill="none" stroke="#8eb4cc" stroke-width="1.2">
      <g transform="translate(98, 44)">
        <rect x="0" y="0" width="56" height="28" fill="#243848" stroke="#5a7a94"/>
        <text class="vendor-tag" x="28" y="19" text-anchor="middle">QSC</text>
      </g>
      <g transform="translate(406, 44)">
        <rect x="0" y="0" width="56" height="28" fill="#243848" stroke="#5a7a94"/>
        <text class="vendor-tag" x="28" y="19" text-anchor="middle">SHURE</text>
      </g>
      <g transform="translate(48, 326)">
        <rect x="0" y="0" width="68" height="28" fill="#243848" stroke="#5a7a94"/>
        <text class="vendor-tag" x="34" y="19" text-anchor="middle">SAMSUNG</text>
      </g>
      <g transform="translate(388, 324)">
        <rect x="0" y="0" width="56" height="28" fill="#243848" stroke="#5a7a94"/>
        <text class="vendor-tag" x="28" y="19" text-anchor="middle">DTV</text>
      </g>
      <!-- Q-SYS: former bottom-center vendor slot, moved to lower-left inner ring -->
      <g transform="translate(120, 368)">
        <rect x="0" y="0" width="64" height="28" fill="#243848" stroke="#5a7a94"/>
        <text class="vendor-tag" x="32" y="19" text-anchor="middle">Q-SYS</text>
      </g>
    </g>

  </g>

  <text font-family="Helvetica, Arial, sans-serif" font-size="11" font-weight="700" letter-spacing="3" fill="#c2d0dc">
    <textPath href="#rim-label" startOffset="50%" text-anchor="middle">STANDARD AV</textPath>
  </text>

</svg>
