<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 780" font-family="'Space Grotesk', sans-serif" role="img" aria-label="LUCI system architecture: content sources (satellite, cable TV, internet, live A/V, music) feed into LUCI. LUCI is the control point — the orchestration platform running on one standardized rack of components, operated from any screen. From there LUCI controls the A/V across the property — displays, video walls, lighting, and background music and paging — over your existing network.">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&amp;display=swap');
      .title   { font-weight:700; font-size:20px; fill:#10232D; }
      .cap      { font-weight:500; font-size:12px; fill:#56707C; }
      .kick     { font-weight:700; font-size:12.5px; letter-spacing:.16em; fill:#10232D; text-anchor:middle; }
      .dlabel   { font-weight:600; font-size:12px; fill:#10232D; text-anchor:middle; }
      .dsub     { font-weight:500; font-size:9.5px; fill:#3F5965; text-anchor:middle; }
      .ulabel   { font-weight:500; font-size:9px; fill:#10232D; text-anchor:end; }
      .conlbl   { font-weight:600; font-size:9.5px; letter-spacing:.02em; fill:#176B54; text-anchor:middle; }
      .leg      { font-weight:500; font-size:11px; fill:#354F5C; }
    </style>
    <marker id="arwM" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L6.5,3 L0,6 Z" fill="#2b9e80"/>
    </marker>
    <marker id="arwG" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L6.5,3 L0,6 Z" fill="#9DAAB2"/>
    </marker>
    <marker id="arwN" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L6.5,3 L0,6 Z" fill="#10232D"/>
    </marker>
    <filter id="feather" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="26"/>
    </filter>
  </defs>

  <!-- canvas -->
  <rect x="0" y="0" width="1400" height="780" fill="#F5F8FA"/>

  <!-- LUCI control-point zone: feathered tint highlight (even, soft edges, no box) -->
  <rect x="350" y="176" width="576" height="462" rx="46" fill="#A6B0B6" fill-opacity="0.42" filter="url(#feather)"/>

  <!-- title + caption -->
  <text class="title" x="56" y="58">System architecture</text>
  <text class="cap"   x="56" y="82">The control point for everything on your property.</text>

  <!-- zone headers -->
  <text class="kick" x="110"  y="128">SOURCES</text>
  <text class="kick" x="637"  y="128">LUCI &#183; THE CONTROL POINT</text>
  <text class="kick" x="1190" y="128">WHAT LUCI CONTROLS</text>
  <text class="dsub" x="1190" y="146">over your existing network</text>

  <!-- ================= CONNECTORS (under nodes) ================= -->
  <!-- sources -> LUCI -->
  <line x1="135" y1="212" x2="300" y2="332" stroke="#9DAAB2" stroke-width="2" marker-end="url(#arwG)"/>
  <line x1="137" y1="305" x2="300" y2="372" stroke="#9DAAB2" stroke-width="2" marker-end="url(#arwG)"/>
  <line x1="137" y1="405" x2="300" y2="409" stroke="#9DAAB2" stroke-width="2" marker-end="url(#arwG)"/>
  <line x1="137" y1="505" x2="300" y2="446" stroke="#9DAAB2" stroke-width="2" marker-end="url(#arwG)"/>
  <line x1="135" y1="598" x2="300" y2="486" stroke="#9DAAB2" stroke-width="2" marker-end="url(#arwG)"/>
  <!-- rack -> interface (hardware runs the platform) -->
  <line x1="609" y1="409" x2="652" y2="409" stroke="#10232D" stroke-width="2" marker-end="url(#arwN)"/>
  <!-- LUCI -> endpoints (controls) -->
  <line x1="908" y1="372" x2="1128" y2="232" stroke="#2b9e80" stroke-width="2" marker-end="url(#arwM)"/>
  <line x1="910" y1="400" x2="1130" y2="348" stroke="#2b9e80" stroke-width="2" marker-end="url(#arwM)"/>
  <line x1="910" y1="428" x2="1140" y2="468" stroke="#2b9e80" stroke-width="2" marker-end="url(#arwM)"/>
  <line x1="908" y1="452" x2="1130" y2="588" stroke="#2b9e80" stroke-width="2" marker-end="url(#arwM)"/>
  <!-- (network note now lives under the "WHAT LUCI CONTROLS" header) -->

  <!-- ================= SOURCES (left) ================= -->
  <!-- Satellite -->
  <g transform="translate(110,205)">
    <g transform="rotate(-22)">
      <ellipse rx="22" ry="15" fill="#FFFFFF" stroke="#10232D" stroke-width="2.2"/>
      <ellipse rx="11" ry="7" fill="none" stroke="#10232D" stroke-width="1.3"/>
    </g>
    <line x1="5" y1="-3" x2="17" y2="-17" stroke="#10232D" stroke-width="2"/>
    <circle cx="17" cy="-17" r="3.6" fill="#68E3BE" stroke="#10232D" stroke-width="1"/>
    <line x1="-3" y1="9" x2="-3" y2="24" stroke="#10232D" stroke-width="2"/>
    <line x1="-13" y1="24" x2="9" y2="24" stroke="#10232D" stroke-width="2"/>
    <text class="dlabel" x="0" y="-30">Satellite</text>
  </g>
  <!-- Cable / Broadcast TV -->
  <g transform="translate(110,305)">
    <line x1="0" y1="-1" x2="-12" y2="-20" stroke="#10232D" stroke-width="2"/>
    <line x1="0" y1="-1" x2="12" y2="-20" stroke="#10232D" stroke-width="2"/>
    <circle cx="-12" cy="-20" r="2.6" fill="#10232D"/>
    <circle cx="12" cy="-20" r="2.6" fill="#68E3BE" stroke="#10232D" stroke-width="0.9"/>
    <rect x="-21" y="-1" width="42" height="28" fill="#FFFFFF" stroke="#10232D" stroke-width="2.2"/>
    <rect x="-15" y="4" width="24" height="18" fill="#E3E9EC"/>
    <line x1="13" y1="-1" x2="13" y2="27" stroke="#10232D" stroke-width="1.6"/>
    <circle cx="17" cy="9" r="1.5" fill="#10232D"/>
    <circle cx="17" cy="15" r="1.5" fill="#10232D"/>
    <text class="dlabel" x="0" y="-30">Cable TV</text>
  </g>
  <!-- Internet -->
  <g transform="translate(110,405)">
    <circle r="22" fill="#FFFFFF" stroke="#10232D" stroke-width="2.2"/>
    <ellipse rx="9" ry="22" fill="none" stroke="#10232D" stroke-width="1.5"/>
    <line x1="-22" y1="0" x2="22" y2="0" stroke="#2b9e80" stroke-width="1.8"/>
    <path d="M-19,-11 A30,30 0 0 1 19,-11" fill="none" stroke="#10232D" stroke-width="1.3"/>
    <path d="M-19,11 A30,30 0 0 0 19,11" fill="none" stroke="#10232D" stroke-width="1.3"/>
    <text class="dlabel" x="0" y="-30">Internet</text>
  </g>
  <!-- Live / in-house A/V -->
  <g transform="translate(110,505)">
    <rect x="-18" y="-11" width="28" height="22" fill="#FFFFFF" stroke="#10232D" stroke-width="2.2"/>
    <path d="M10,-6 L21,-12 L21,12 L10,6 Z" fill="#FFFFFF" stroke="#10232D" stroke-width="2"/>
    <circle cx="-9" cy="0" r="3" fill="#68E3BE"/>
    <text class="dlabel" x="2" y="-22">Live A/V</text>
  </g>
  <!-- Streaming / music -->
  <g transform="translate(110,605)">
    <line x1="-6" y1="12" x2="-6" y2="-15" stroke="#10232D" stroke-width="2.4"/>
    <line x1="12" y1="8" x2="12" y2="-19" stroke="#10232D" stroke-width="2.4"/>
    <line x1="-7" y1="-15.5" x2="13" y2="-19.5" stroke="#10232D" stroke-width="3.4"/>
    <ellipse cx="-10" cy="11" rx="5" ry="3.6" fill="#10232D" transform="rotate(-20 -10 11)"/>
    <ellipse cx="8" cy="7" rx="5" ry="3.6" fill="#68E3BE" stroke="#10232D" stroke-width="1" transform="rotate(-20 8 7)"/>
    <text class="dlabel" x="2" y="-28">Music</text>
  </g>

  <!-- ================= LUCI (center) ================= -->
  <!-- rack (stretched for label room) -->
  <image href="rack.png" x="370" y="164" width="235" height="490"/>

  <!-- rack overlay labels — one uniform chip per unit (mint tick + navy field + white text) -->
  <g font-family="'Space Grotesk', sans-serif" font-size="8.5" font-weight="600" fill="#FFFFFF">
    <g><rect x="396" y="200.5" width="86"  height="15" fill="#10232D" fill-opacity="0.78"/><rect x="396" y="200.5" width="2.5" height="15" fill="#68E3BE"/><text x="404" y="211">Network Switch</text></g>
    <g><rect x="396" y="227.5" width="90"  height="15" fill="#10232D" fill-opacity="0.78"/><rect x="396" y="227.5" width="2.5" height="15" fill="#68E3BE"/><text x="404" y="238">LUCI CCS Server</text></g>
    <g><rect x="396" y="274.5" width="126" height="15" fill="#10232D" fill-opacity="0.78"/><rect x="396" y="274.5" width="2.5" height="15" fill="#68E3BE"/><text x="404" y="285">Satellite Video Server</text></g>
    <g><rect x="396" y="332.5" width="142" height="15" fill="#10232D" fill-opacity="0.78"/><rect x="396" y="332.5" width="2.5" height="15" fill="#68E3BE"/><text x="404" y="343">Satellite RF Distribution</text></g>
    <g><rect x="396" y="380.5" width="122" height="15" fill="#10232D" fill-opacity="0.78"/><rect x="396" y="380.5" width="2.5" height="15" fill="#68E3BE"/><text x="404" y="391">Digital Media Players</text></g>
    <g><rect x="396" y="423.5" width="106" height="15" fill="#10232D" fill-opacity="0.78"/><rect x="396" y="423.5" width="2.5" height="15" fill="#68E3BE"/><text x="404" y="434">NX-5 IPTV Encoders</text></g>
    <g><rect x="396" y="467.5" width="138" height="15" fill="#10232D" fill-opacity="0.78"/><rect x="396" y="467.5" width="2.5" height="15" fill="#68E3BE"/><text x="404" y="478">Background Music Players</text></g>
    <g><rect x="396" y="511.5" width="112" height="15" fill="#10232D" fill-opacity="0.78"/><rect x="396" y="511.5" width="2.5" height="15" fill="#68E3BE"/><text x="404" y="522">Audio System Server</text></g>
    <g><rect x="396" y="551.5" width="96"  height="15" fill="#10232D" fill-opacity="0.78"/><rect x="396" y="551.5" width="2.5" height="15" fill="#68E3BE"/><text x="404" y="562">Audio Amplifiers</text></g>
  </g>

  <!-- interface monitor (centerpiece) -->
  <rect x="655" y="314" width="250" height="190" fill="#15323B"/>
  <image href="platform-ui.png" x="661" y="320" width="238" height="171"/>
  <path d="M760,504 L800,504 L812,520 L748,520 Z" fill="#15323B"/>
  <line x1="728" y1="520" x2="832" y2="520" stroke="#15323B" stroke-width="4"/>
  <text class="dlabel" x="780" y="542">LUCI &#8212; Orchestration platform</text>
  <text class="dsub"   x="780" y="559">Operated from any screen &#183; no app required</text>

  <!-- ================= ENDPOINTS (right) ================= -->
  <!-- New or existing displays -->
  <g transform="translate(1190,212)">
    <rect x="-40" y="-30" width="66" height="44" fill="#FFFFFF" stroke="#10232D" stroke-width="2.2"/>
    <rect x="-22" y="-16" width="66" height="44" fill="#FFFFFF" stroke="#10232D" stroke-width="2.2"/>
    <rect x="-16" y="-10" width="54" height="32" fill="#68E3BE"/>
    <path d="M2,28 L28,28 L31,35 L-1,35 Z" fill="#FFFFFF" stroke="#10232D" stroke-width="2"/>
    <text class="dlabel" x="6" y="58">New or Existing Displays</text>
  </g>
  <!-- Video walls -->
  <g transform="translate(1190,345)">
    <rect x="-39" y="-29" width="36" height="26" fill="#FFFFFF" stroke="#10232D" stroke-width="2"/>
    <rect x="3" y="-29" width="36" height="26" fill="#68E3BE" stroke="#10232D" stroke-width="2"/>
    <rect x="-39" y="3" width="36" height="26" fill="#68E3BE" stroke="#10232D" stroke-width="2"/>
    <rect x="3" y="3" width="36" height="26" fill="#FFFFFF" stroke="#10232D" stroke-width="2"/>
    <text class="dlabel" x="0" y="52">Video Walls</text>
    <text class="dsub" x="0" y="66">Satellite &#183; Marketing &#183; Menu &#183; Music Video</text>
  </g>
  <!-- Lighting -->
  <g transform="translate(1190,470)">
    <circle cx="0" cy="-6" r="13" fill="#FFFFFF" stroke="#10232D" stroke-width="2.2"/>
    <path d="M-5,7 L5,7 L4,14 L-4,14 Z" fill="#FFFFFF" stroke="#10232D" stroke-width="1.8"/>
    <line x1="-3.5" y1="17" x2="3.5" y2="17" stroke="#10232D" stroke-width="1.8"/>
    <path d="M-4,-7 L0,-2 L4,-7" fill="none" stroke="#2b9e80" stroke-width="1.8"/>
    <line x1="0" y1="-25" x2="0" y2="-31" stroke="#10232D" stroke-width="1.8"/>
    <line x1="-15" y1="-19" x2="-19" y2="-23" stroke="#10232D" stroke-width="1.8"/>
    <line x1="15" y1="-19" x2="19" y2="-23" stroke="#10232D" stroke-width="1.8"/>
    <text class="dlabel" x="0" y="40">Lighting</text>
  </g>
  <!-- Background music & paging -->
  <g transform="translate(1190,600)">
    <rect x="-15" y="-26" width="32" height="52" fill="#FFFFFF" stroke="#10232D" stroke-width="2.2"/>
    <circle cx="1" cy="-11" r="8" fill="none" stroke="#10232D" stroke-width="1.8"/>
    <circle cx="1" cy="-11" r="2.4" fill="#68E3BE"/>
    <circle cx="1" cy="12" r="5" fill="none" stroke="#10232D" stroke-width="1.8"/>
    <circle cx="1" cy="12" r="1.8" fill="#68E3BE"/>
    <path d="M26,-12 q9,16 0,32" fill="none" stroke="#2b9e80" stroke-width="1.6"/>
    <path d="M34,-18 q13,22 0,44" fill="none" stroke="#2b9e80" stroke-width="1.6"/>
    <text class="dlabel" x="6" y="52">Background Music &amp; Paging</text>
  </g>

</svg>
