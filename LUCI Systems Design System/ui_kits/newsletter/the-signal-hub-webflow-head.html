<!-- The Signal Hub · Webflow <head> embed -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    :root {
      --navy-deep:   #0A161C;
      --navy:        #10232D;
      --navy-mid:    #314955;
      --navy-muted:  #49616E;
      --mint:        #68E3BE;
      --mint-rgb:    104, 227, 190;
      --mint-dark:   #2b9e80;
      --sand:        #E5E3DF;
      --off-white:   #F5F8FA;
      --white:       #FFFFFF;
      --rule-light:  #D4D9DC;

      --display: 'Syncopate', 'Arial Black', sans-serif;
      --body:    'Space Grotesk', 'Trebuchet MS', sans-serif;

      --max:  920px;
      --pad:  clamp(24px, 5vw, 48px);
      --read: 60ch;
    }

    body {
      font-family: var(--body);
      background: var(--navy-deep);
      color: #354F5C;
      -webkit-font-smoothing: antialiased;
      font-size: 18px;
      line-height: 1.72;
    }

    .hub {
      max-width: var(--max);
      margin: 0 auto;
      background: var(--white);
    }

    /* ── HERO / MASTHEAD ──────────────────────────────── */
    .hero {
      background: var(--navy);
      padding: var(--pad);
      position: relative;
      overflow: hidden;
    }

    .hero::after {
      content: '';
      display: block;
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 4px;
      background: var(--mint);
    }

    .hero__row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
      padding-bottom: 16px;
      margin-bottom: 16px;
      border-bottom: 1px solid rgba(var(--mint-rgb), 0.15);
    }

    .hero__logo img { height: 28px; display: block; }

    .hero__badge {
      font-family: var(--display);
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--mint);
      text-align: right;
    }

    .hero__title {
      font-family: var(--display);
      font-size: clamp(44px, 10vw, 72px);
      font-weight: 700;
      line-height: 0.9;
      letter-spacing: -0.03em;
      color: var(--off-white);
      position: relative;
      z-index: 1;
    }

    .hero__title em {
      font-style: normal;
      color: var(--mint);
      display: block;
    }

    .hero__deck {
      margin-top: 12px;
      font-size: 16px;
      line-height: 1.6;
      color: rgba(235, 245, 248, 0.92);
      max-width: 48ch;
      position: relative;
      z-index: 1;
    }

    /* ── FEATURED ISSUE ───────────────────────────────── */
    .featured {
      background: var(--off-white);
      padding: clamp(20px, 4vw, 28px) var(--pad);
      border-bottom: 1px solid var(--rule-light);
    }

    .featured__label {
      font-family: var(--display);
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--mint-dark);
      margin-bottom: 14px;
    }

    .featured__card {
      position: relative;
      background: var(--navy);
      padding: 22px 24px 20px;
      overflow: hidden;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 20px 28px;
      align-items: end;
    }

    .featured__card::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 4px;
      background: var(--mint);
    }

    .featured__card-main {
      position: relative;
      z-index: 1;
      min-width: 0;
      padding-right: clamp(56px, 12vw, 88px);
    }

    .featured__card-head {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 10px;
      padding-bottom: 10px;
      border-bottom: 1px solid rgba(var(--mint-rgb), 0.2);
      max-width: 52ch;
    }

    .featured__card-head-sep {
      font-family: var(--display);
      font-size: 11px;
      font-weight: 700;
      color: rgba(var(--mint-rgb), 0.45);
      line-height: 1;
    }

    .featured__card-kicker {
      font-family: var(--display);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--mint);
    }

    .featured__card-date {
      font-family: var(--display);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--off-white);
    }

    .featured__card-title {
      font-family: var(--body);
      font-size: clamp(18px, 2.6vw, 22px);
      font-weight: 700;
      line-height: 1.2;
      letter-spacing: -0.015em;
      color: var(--off-white);
      max-width: 42ch;
      margin-bottom: 14px;
    }

    .featured__card-bullets {
      list-style: none;
      max-width: 52ch;
    }

    .featured__card-bullets li {
      font-size: 15px;
      line-height: 1.55;
      color: rgba(235, 245, 248, 0.92);
      padding-left: 14px;
      position: relative;
      margin-bottom: 8px;
    }

    .featured__card-bullets li:last-child { margin-bottom: 0; }

    .featured__card-bullets li::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0.6em;
      width: 5px;
      height: 5px;
      background: var(--mint);
      border-radius: 50%;
    }

    .featured__card-bullets strong {
      font-weight: 600;
      color: var(--off-white);
    }

    .featured__card-num {
      font-family: var(--display);
      font-size: clamp(56px, 10vw, 80px);
      font-weight: 700;
      line-height: 1;
      letter-spacing: -0.04em;
      color: rgba(var(--mint-rgb), 0.28);
      position: absolute;
      top: 12px;
      right: 20px;
      pointer-events: none;
      user-select: none;
    }

    .featured__card-action {
      position: relative;
      z-index: 1;
      flex-shrink: 0;
      align-self: end;
    }

    .hub-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-family: var(--display);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      text-decoration: none;
      color: var(--navy);
      background: var(--mint);
      padding: 12px 18px;
      transition: background 0.15s, color 0.15s;
      white-space: nowrap;
    }

    .hub-btn:hover {
      background: var(--mint-dark);
      color: var(--off-white);
    }

    .hub-btn__arrow {
      font-family: var(--body);
      font-size: 15px;
      font-weight: 700;
      line-height: 1;
    }

    /* ── ARCHIVE ──────────────────────────────────────── */
    .archive {
      background: var(--white);
      padding: var(--pad);
    }

    .archive__header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: clamp(24px, 4vw, 32px);
      padding-bottom: 16px;
      border-bottom: 1px solid var(--rule-light);
    }

    .archive__title {
      font-family: var(--display);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--navy);
    }

    .archive__note {
      font-size: 14px;
      color: #354F5C;
    }

    .archive__grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 20px;
    }

    .issue-card {
      display: flex;
      flex-direction: column;
      text-decoration: none;
      color: inherit;
      min-height: 100%;
    }

    .issue-card:hover:not(.issue-card--placeholder) .issue-card__title { color: var(--mint-dark); }
    .issue-card:hover:not(.issue-card--placeholder) .issue-card__link { color: var(--mint); }

    .issue-card--placeholder {
      opacity: 0.55;
      cursor: default;
      pointer-events: none;
    }

    .issue-card__thumb {
      background: var(--navy);
      padding: 28px 22px 24px;
      min-height: 140px;
      position: relative;
      overflow: hidden;
    }

    .issue-card__thumb::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 3px;
      background: var(--mint);
    }

    .issue-card__num {
      font-family: var(--display);
      font-size: 48px;
      font-weight: 700;
      line-height: 1;
      letter-spacing: -0.04em;
      color: rgba(var(--mint-rgb), 0.35);
      position: absolute;
      top: 12px;
      right: 14px;
    }

    .issue-card__status {
      font-family: var(--display);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--mint);
    }

    .issue-card__body {
      padding: 16px 2px 0;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .issue-card__meta {
      font-size: 12px;
      font-weight: 500;
      color: var(--navy-muted);
      letter-spacing: 0.04em;
      margin-bottom: 8px;
    }

    .issue-card__title {
      font-size: 16px;
      font-weight: 700;
      line-height: 1.3;
      letter-spacing: -0.01em;
      color: var(--navy);
      margin-bottom: 10px;
    }

    .issue-card__desc {
      font-size: 15px;
      line-height: 1.55;
      color: #354F5C;
      flex: 1;
    }

    .issue-card__link {
      margin-top: 14px;
      font-family: var(--display);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--mint-dark);
    }

    /* ── FOOTER ───────────────────────────────────────── */
    .hub .footer {
      background: var(--navy);
      padding: clamp(28px, 5vw, 40px) var(--pad) clamp(32px, 5vw, 44px);
      border-top: 1px solid rgba(var(--mint-rgb), 0.12);
    }

    .hub .footer__about {
      font-size: 15px;
      line-height: 1.65;
      color: rgba(165, 179, 188, 0.85);
      margin: 0 0 24px;
      padding: 0 0 24px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    }

    .hub .footer__row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 32px 40px;
      flex-wrap: wrap;
      padding-bottom: 24px;
      margin-bottom: 24px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    }

    .hub .footer__brand {
      flex: 0 0 auto;
      min-width: min-content;
    }

    .hub .footer__brand img {
      display: block;
      height: 22px;
      width: auto;
      max-width: none;
    }

    .hub .footer__tag {
      display: block;
      font-family: var(--display);
      font-size: 9px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--mint);
      margin: 10px 0 0;
      line-height: 1.5;
      white-space: nowrap !important;
      max-width: none !important;
      width: max-content;
    }

    .hub .footer__links {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, auto));
      gap: 10px 36px;
      margin: 0;
      padding: 0;
      list-style: none;
      text-align: left;
    }

    .hub .footer__links li { margin: 0; padding: 0; }

    .hub .footer__links a {
      display: inline-block;
      font-size: 13px;
      line-height: 1.4;
      color: rgba(var(--mint-rgb), 0.75);
      text-decoration: none;
      white-space: nowrap;
    }

    .hub .footer__links a:hover { color: var(--mint); }

    .hub .footer__legal {
      font-size: 12px;
      line-height: 1.6;
      color: rgba(165, 179, 188, 0.55);
      margin: 0;
    }

    /* ── RESPONSIVE ───────────────────────────────────── */
    @media (max-width: 720px) {
      .featured__card {
        grid-template-columns: 1fr;
        gap: 16px;
      }

      .featured__card-action {
        align-self: start;
      }

      .hub .footer__row {
        flex-direction: column;
        align-items: flex-start;
      }

      .hub .footer__links {
        grid-template-columns: 1fr;
        gap: 10px;
      }
    }
</style>
