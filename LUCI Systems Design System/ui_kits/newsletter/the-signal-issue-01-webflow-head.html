<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    :root {
      /* Brand palette */
      --navy-deep:   #0A161C;
      --navy:        #10232D;
      --navy-mid:    #314955;
      --navy-muted:  #49616E;
      --mint:        #68E3BE;
      --mint-rgb:    104, 227, 190;   /* same as --mint, used for rgba() tints */
      --mint-dark:   #2b9e80;
      --sand:        #E5E3DF;
      --off-white:   #F5F8FA;
      --white:       #FFFFFF;
      --rule-light:  #D4D9DC;

      /* Type */
      --display: 'Syncopate', 'Arial Black', sans-serif;
      --body:    'Space Grotesk', 'Trebuchet MS', sans-serif;

      /* Layout */
      --max:  820px;
      --pad:  clamp(28px, 6vw, 60px);
      --read: 60ch;
    }

    body {
      font-family: var(--body);
      background: var(--navy-deep);
      color: #354F5C;
      -webkit-font-smoothing: antialiased;
      font-size: 18px;
      line-height: 1.72;
    }

    .issue {
      max-width: var(--max);
      margin: 0 auto;
      background: var(--white);
    }

    /* ── MASTHEAD ─────────────────────────────────────── */
    .masthead {
      background: var(--navy);
      padding: var(--pad);
      position: relative;
      overflow: hidden;
    }

    /* Mint accent bar at bottom */
    .masthead::after {
      content: '';
      display: block;
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 4px;
      background: var(--mint);
    }

    .masthead__row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
      padding-bottom: clamp(20px, 3vw, 28px);
      margin-bottom: clamp(20px, 3vw, 28px);
      border-bottom: 1px solid rgba(var(--mint-rgb), 0.15);
    }

    .masthead__logo img { height: 28px; display: block; }

    .masthead__vol {
      font-size: 12px;
      font-weight: 500;
      color: rgba(165,179,188,0.82);
      letter-spacing: 0.05em;
      text-align: right;
    }

    /* Publication title — the hero */
    .masthead__title {
      font-family: var(--display);
      font-size: clamp(52px, 12vw, 96px);
      font-weight: 700;
      line-height: 0.9;
      letter-spacing: -0.03em;
      color: var(--off-white);
      position: relative;
      z-index: 1;
    }

    .masthead__title em {
      font-style: normal;
      color: var(--mint);
      display: block;
    }

    /* Giant issue number watermark */
    .masthead__numeral {
      font-family: var(--display);
      font-size: clamp(100px, 22vw, 200px);
      font-weight: 700;
      line-height: 0.85;
      letter-spacing: -0.04em;
      color: rgba(var(--mint-rgb), 0.05);
      position: absolute;
      right: calc(var(--pad) - 8px);
      bottom: -12px;
      pointer-events: none;
      user-select: none;
    }

    .masthead__deck {
      margin-top: 14px;
      font-size: 14px;
      line-height: 1.6;
      color: rgba(165, 179, 188, 0.7);
      max-width: 44ch;
      position: relative;
      z-index: 1;
    }

    .masthead__issue {
      margin-top: 30px;
      position: relative;
      z-index: 1;
    }

    .masthead__issue-label {
      display: block;
      font-family: var(--display);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--mint);
      margin-bottom: 8px;
    }

    .masthead__issue-title {
      display: block;
      font-family: var(--body);
      font-size: clamp(18px, 3vw, 24px);
      font-weight: 700;
      line-height: 1.2;
      letter-spacing: -0.015em;
      color: var(--off-white);
      max-width: 42ch;
    }

    .masthead__distro {
      display: inline-block;
      margin-top: 18px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--mint);
      border: 1px solid rgba(var(--mint-rgb), 0.4);
      padding: 4px 10px;
      position: relative;
      z-index: 1;
    }

    /* ── TABLE OF CONTENTS ────────────────────────────── */
    .toc {
      background: var(--navy);
      padding: clamp(28px, 5vw, 38px) var(--pad);
      border-bottom: 1px solid rgba(var(--mint-rgb), 0.15);
    }

    .toc__label {
      font-family: var(--display);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--mint);
      margin-bottom: 14px;
    }

    .toc__list {
      list-style: none;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      column-gap: 36px;
    }

    @media (max-width: 600px) {
      .toc__list { grid-template-columns: 1fr; }
    }

    .toc__list a {
      display: flex;
      align-items: baseline;
      gap: 14px;
      padding: 13px 2px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.09);
      color: var(--off-white);
      text-decoration: none;
      font-size: 15px;
      font-weight: 500;
      line-height: 1.3;
      transition: color 0.15s, border-color 0.15s;
    }

    .toc__num {
      font-family: var(--display);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.06em;
      color: var(--mint);
      min-width: 22px;
    }

    .toc__text { flex: 1; }

    .toc__arrow {
      color: rgba(var(--mint-rgb), 0.4);
      transition: transform 0.15s, color 0.15s;
    }

    .toc__list a:hover {
      color: var(--white);
      border-color: rgba(var(--mint-rgb), 0.4);
    }

    .toc__list a:hover .toc__arrow {
      color: var(--mint);
      transform: translateX(3px);
    }

    /* ── SECTION ANATOMY ──────────────────────────────── */

    /*
      Each section has a kicker (department label), a headline, and body.
      Visual registers (alternate to keep the reader moving — reserve deep/dark for Closing + Footer only):
        --sand:     marquee story (In the field) — warm light; transitions cleanly from dark TOC
        --white:    primary reading sections; required wrapper for callouts
        --light:    alternate reading sections (off-white)
        --deep:     Closing only — signals end of issue content
    */

    .sec {
      padding: clamp(40px, 6vw, 64px) var(--pad);
      border-bottom: 1px solid var(--rule-light);
      position: relative;
    }

    .sec--white   { background: var(--white); }
    .sec--light   { background: var(--off-white); }
    .sec--sand    { background: var(--sand); }
    .sec--mid     { background: var(--navy-mid); border-bottom-color: rgba(0,0,0,0.2); }
    .sec--dark    { background: var(--navy); border-bottom-color: rgba(0,0,0,0.3); }
    .sec--deep    { background: var(--navy-deep); border-bottom-color: rgba(0,0,0,0.4); }

    /* Marquee — lead story (In the field). Warm sand + scaled headline; no dark grey block after TOC. */
    .sec--marquee {
      background: var(--sand);
    }

    .sec--marquee .art-title {
      font-size: clamp(30px, 5vw, 42px);
      max-width: 24ch;
      color: var(--navy);
    }

    .sec--marquee .kicker__rule { background: var(--mint-dark); }
    .sec--marquee .kicker__label { color: var(--mint-dark); }

    .sec--marquee .field-property {
      border-bottom-color: var(--rule-light);
    }

    .sec--marquee .field-property__name,
    .sec--marquee .field-property__location {
      color: var(--mint-dark);
    }

    .sec--marquee .field-story__block {
      border-bottom-color: var(--rule-light);
    }

    .sec--marquee .field-story__heading {
      color: var(--mint-dark);
    }

    .sec--marquee .field-story__block p,
    .sec--marquee .field-story-list li,
    .sec--marquee .field-plan-list li {
      color: #354F5C;
    }

    .sec--marquee .field-plan-list strong {
      color: var(--navy);
    }

    .sec--marquee .field-results li {
      border-bottom-color: var(--rule-light);
      color: #354F5C;
    }

    .sec--marquee .field-results li::before {
      color: var(--mint-dark);
    }

    .sec--marquee .field-story-list li::before {
      background: var(--mint-dark);
    }

    .sec--marquee .field-story__cta {
      border-top-color: var(--rule-light);
    }

    .sec--marquee .field-story__cta p {
      color: #49616E;
    }

    .sec--marquee .pullquote {
      color: var(--navy);
    }

    .sec--marquee .quote-attrib__title,
    .sec--marquee .quote-attrib__location {
      color: var(--mint-dark);
    }

    /* Department kicker — centered section label */
    .kicker {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      width: 100%;
      margin-bottom: 24px;
    }

    .kicker__rule {
      width: 28px;
      height: 2px;
      background: var(--mint);
      flex-shrink: 0;
    }

    .kicker__label {
      font-family: var(--display);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--mint);
    }

    .sec--white .kicker__rule,
    .sec--light .kicker__rule {
      background: var(--mint-dark);
    }

    .sec--white .kicker__label,
    .sec--light .kicker__label {
      color: var(--mint-dark);
    }

    /* Article headline */
    .art-title {
      font-family: var(--body);
      font-weight: 700;
      font-size: clamp(26px, 4.5vw, 38px);
      line-height: 1.1;
      letter-spacing: -0.025em;
      max-width: 22ch;
      margin-bottom: 20px;
    }

    .sec--white .art-title,
    .sec--light .art-title  { color: var(--navy); }
    .sec--mid .art-title    { color: var(--off-white); }
    .sec--dark .art-title   { color: var(--off-white); }
    .sec--deep .art-title   { color: var(--off-white); }

    /* Body copy */
    .art-body p {
      font-size: 17px;
      line-height: 1.72;
      margin-bottom: 16px;
      max-width: var(--read);
    }

    .art-body p:last-child { margin-bottom: 0; }

    .art-signoff {
      margin-top: 32px;
      max-width: var(--read);
    }
    .art-signoff__line {
      font-size: 17px;
      line-height: 1.72;
      color: #354F5C;
      margin-bottom: 18px;
    }
    .art-signoff__name {
      font-size: 18px;
      font-weight: 600;
      line-height: 1.3;
      color: var(--navy);
    }
    .art-signoff__role {
      margin-top: 4px;
      font-family: var(--display);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--mint-dark);
    }

    .sec--white .art-body p,
    .sec--light .art-body p { color: #354F5C; }

    .sec--mid .art-body p { color: rgba(235, 245, 248, 0.88); }
    .sec--dark .art-body p { color: rgba(235, 245, 248, 0.92); }
    .sec--deep .art-body p { color: rgba(235, 245, 248, 0.88); }

    .art-body ul, .art-body ol {
      margin: 0 0 16px 20px;
      max-width: var(--read);
    }

    .art-body li {
      font-size: 17px;
      line-height: 1.65;
      margin-bottom: 10px;
    }

    .sec--white .art-body li,
    .sec--light .art-body li { color: #354F5C; }
    .sec--mid .art-body li,
    .sec--dark .art-body li,
    .sec--deep .art-body li  { color: rgba(235, 245, 248, 0.88); }

    .art-body li::marker { color: var(--mint); }
    .sec--white .art-body li::marker { color: var(--mint-dark); }

    .art-body strong { color: inherit; font-weight: 700; }

    .sec--dark .art-body strong,
    .sec--mid .art-body strong,
    .sec--deep .art-body strong { color: var(--off-white); }

    /* Links */
    .art-body a { color: var(--mint-dark); font-weight: 600; }
    .sec--dark .art-body a,
    .sec--mid .art-body a,
    .sec--deep .art-body a { color: var(--mint); }

    /* ── CALLOUT (contained aside — Quick Tip, Support) ── */
    .callout {
      background: var(--navy);
      border-left: 4px solid var(--mint);
      padding: clamp(24px, 4vw, 32px);
      max-width: var(--read);
    }

    .callout__kicker {
      font-family: var(--display);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--mint);
      margin-bottom: 14px;
    }

    .callout p {
      font-size: 18px;
      line-height: 1.7;
      margin-bottom: 12px;
    }

    .callout p:last-child { margin-bottom: 0; }

    .callout strong { color: var(--off-white); font-weight: 700; }

    .callout a { color: var(--mint); font-weight: 600; text-decoration: underline; text-underline-offset: 3px; }

    .callout p { color: rgba(235, 245, 248, 0.95); }

    /* ── PULL QUOTE ───────────────────────────────────── */
    .pullquote {
      margin: 32px 0 8px;
      font-size: clamp(19px, 2.8vw, 24px);
      font-style: italic;
      line-height: 1.45;
      color: var(--off-white);
      border-left: 4px solid var(--mint);
      padding: 16px 0 16px 24px;
      max-width: 32ch;
    }

    /* ── IN THE FIELD: property header ───────────────── */
    .field-property {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 24px;
      padding-bottom: 20px;
      border-bottom: 1px solid rgba(var(--mint-rgb), 0.15);
    }

    .field-property__logo {
      flex-shrink: 0;
      background: var(--white);
      padding: 10px 14px;
      line-height: 0;
    }

    .field-property__logo img {
      height: 32px;
      width: auto;
      display: block;
    }

    .field-property__name {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--mint);
      line-height: 1.5;
    }

    .field-property__location {
      display: block;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.06em;
      color: var(--mint);
      margin-top: 4px;
      text-transform: none;
    }

    @media (max-width: 480px) {
      .field-property { flex-direction: column; align-items: flex-start; }
    }

    /* ── IN THE FIELD: story stack ───────────────────── */
    .field-story {
      display: flex;
      flex-direction: column;
      margin-top: 8px;
    }

    .field-story__block {
      padding: 26px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .field-story__block:first-child { padding-top: 0; }
    .field-story__block:last-child { border-bottom: none; padding-bottom: 0; }

    .field-story__block--accent {
      background: transparent;
    }

    .field-story__heading {
      font-family: var(--display);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--mint);
      margin-bottom: 16px;
    }

    .field-story__block p {
      font-size: 16px;
      line-height: 1.68;
      color: rgba(235, 245, 248, 0.88);
      margin-bottom: 14px;
      max-width: none;
    }

    .field-story__block p:last-child { margin-bottom: 0; }

    /* Inline bullet list inside The Story */
    .field-story-list {
      list-style: none;
      margin: 0 0 16px 0;
      padding: 0;
    }

    .field-story-list li {
      position: relative;
      padding-left: 22px;
      font-size: 16px;
      line-height: 1.55;
      color: rgba(235, 245, 248, 0.88);
      margin-bottom: 10px;
    }

    .field-story-list li:last-child { margin-bottom: 14px; }

    .field-story-list li::before {
      content: '';
      position: absolute;
      left: 0;
      top: 11px;
      width: 10px;
      height: 2px;
      background: var(--mint);
    }

    /* The Plan: two forward-looking outcomes */
    .field-plan-list {
      list-style: none;
      margin: 18px 0 0 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      gap: 22px;
    }

    .field-plan-list li {
      display: grid;
      grid-template-columns: 28px 1fr;
      gap: 14px;
      font-size: 16px;
      line-height: 1.65;
      color: rgba(235, 245, 248, 0.88);
    }

    .field-plan-list li::before {
      content: '\2713';
      font-size: 20px;
      font-weight: 700;
      color: var(--mint);
      line-height: 1.3;
    }

    .field-plan-list strong {
      color: var(--off-white);
      font-weight: 700;
      margin-right: 4px;
    }

    /* Results: airy two-column rows, hairline-separated */
    .field-results {
      display: grid;
      grid-template-columns: 1fr 1fr;
      column-gap: 32px;
      list-style: none;
      margin: 0;
      padding: 0;
      counter-reset: result;
    }

    @media (max-width: 480px) {
      .field-results { grid-template-columns: 1fr; }
    }

    .field-results li {
      display: flex;
      gap: 12px;
      align-items: baseline;
      padding: 14px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      font-size: 15px;
      line-height: 1.45;
      color: rgba(235, 245, 248, 0.92);
      margin: 0;
    }

    .field-results li::before {
      content: counter(result, decimal-leading-zero);
      counter-increment: result;
      font-family: var(--display);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: var(--mint);
      min-width: 22px;
    }

    .field-story__cta {
      margin-top: 28px;
      padding-top: 24px;
      border-top: 1px solid rgba(var(--mint-rgb), 0.15);
    }

    .field-story__cta p {
      font-size: 15px;
      line-height: 1.6;
      color: rgba(235, 245, 248, 0.75);
      margin-bottom: 16px;
      max-width: none;
    }

    .field-story__cta a.field-cta-btn {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      font-family: var(--body);
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-decoration: none;
      color: var(--navy);
      background: var(--mint);
      padding: 16px 26px;
      transition: background 0.15s;
    }

    .field-story__cta a.field-cta-btn:hover {
      background: #7aedc8;
      color: var(--navy);
    }

    .field-cta-btn__arrow {
      font-family: var(--body);
      font-size: 18px;
      font-weight: 700;
      line-height: 1;
    }

    .quote-attrib {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding-left: 28px;
      line-height: 1.6;
    }

    .quote-attrib__title,
    .quote-attrib__location {
      display: block;
      color: var(--mint);
    }

    .quote-attrib__location {
      margin-top: 2px;
    }

    /* ── AUTHOR CARD (de-boxed) ───────────────────────── */
    .author-card {
      margin-top: 28px;
      padding-top: 24px;
      border-top: 1px solid var(--rule-light);
      max-width: var(--read);
    }

    .author-card__header {
      display: inline-block;
      margin-bottom: 18px;
      color: var(--mint-dark);
      font-family: var(--body);
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.01em;
      text-decoration: none;
    }

    .author-card__header:hover {
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    .author-card__content {
      display: flex;
      gap: 20px;
      align-items: flex-start;
      padding: 0;
    }

    @media (max-width: 500px) {
      .author-card__content { flex-direction: column; align-items: center; }
    }

    .author-card__img {
      flex-shrink: 0;
      width: 80px;
      height: 80px;
      overflow: hidden;
      background: var(--sand);
    }

    .author-card__img img {
      display: block;
      width: 80px;
      height: 80px;
      object-fit: cover;
      object-position: center 10%;
      filter: saturate(0.85) brightness(1.05) contrast(0.95);
    }

    .author-card__body { flex: 1; min-width: 0; }

    .author-card__name {
      font-weight: 700;
      font-size: 16px;
      color: var(--navy);
      margin-bottom: 4px;
    }

    .author-card__title {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--mint-dark);
      margin-bottom: 10px;
    }

    .author-card__contact {
      font-size: 14px;
      color: #49616E;
    }

    .author-card__contact a { color: var(--mint-dark); font-weight: 600; }

    /* ── SERVICES (de-boxed definition list) ──────────── */
    .svc-list {
      margin: 28px 0;
    }

    .svc-list > div {
      padding: 22px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .svc-list > div:first-child { padding-top: 0; }
    .svc-list > div:last-child { border-bottom: none; padding-bottom: 0; }

    .svc-list dt {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.01em;
      color: var(--mint);
      margin-bottom: 7px;
    }

    .svc-list dd {
      margin: 0;
      font-size: 15px;
      line-height: 1.62;
      color: rgba(235, 245, 248, 0.86);
    }

    /* Services list on light/white sections (Beyond the platform) */
    .sec--white .svc-list > div,
