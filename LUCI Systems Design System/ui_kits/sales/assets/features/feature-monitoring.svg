<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180" role="img" aria-label="A monitoring screen with a live health gauge, pulse line, and an alert being caught">
  <defs>
    <linearGradient id="screen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1A4150"/>
      <stop offset="1" stop-color="#0B1D26"/>
    </linearGradient>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="6" stdDeviation="7" flood-color="#0B1D26" flood-opacity="0.20"/>
    </filter>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2.6"/>
    </filter>
  </defs>
  <rect width="320" height="180" fill="#EFF3F5"/>
  <rect x="30" y="26" width="260" height="128" rx="13" fill="url(#screen)" filter="url(#soft)"/>
  <g stroke="#FFFFFF" stroke-opacity="0.06" stroke-width="1">
    <line x1="48" y1="118" x2="272" y2="118"/><line x1="48" y1="100" x2="272" y2="100"/><line x1="48" y1="82" x2="272" y2="82"/>
  </g>
  <!-- health gauge -->
  <circle cx="78" cy="68" r="22" fill="none" stroke="#FFFFFF" stroke-opacity="0.12" stroke-width="5"/>
  <circle cx="78" cy="68" r="22" fill="none" stroke="#68E3BE" stroke-width="5" stroke-linecap="round" stroke-dasharray="100 38" transform="rotate(-90 78 68)"/>
  <circle cx="78" cy="68" r="3" fill="#68E3BE"/>
  <rect x="112" y="56" width="44" height="5" rx="2.5" fill="#FFFFFF" opacity="0.22"/>
  <rect x="112" y="68" width="30" height="4" rx="2" fill="#FFFFFF" opacity="0.12"/>
  <!-- pulse line -->
  <path d="M48 116 H92 L104 92 L116 132 L128 108 L150 108 H196 L208 84 L220 124 L232 108 H272"
        fill="none" stroke="#68E3BE" stroke-opacity="0.4" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
  <path d="M48 116 H92 L104 92 L116 132 L128 108 L150 108 H196 L208 84 L220 124 L232 108 H272"
        fill="none" stroke="#68E3BE" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="208" cy="84" r="3.4" fill="#FFFFFF"/>
  <!-- alert toast caught early -->
  <g filter="url(#soft)">
    <rect x="196" y="36" width="86" height="34" rx="8" fill="#EDD086"/>
    <path d="M213 46 l7 13 h-14 z" fill="#10232D"/>
    <rect x="210.5" y="51" width="2" height="4.4" rx="1" fill="#EDD086"/><circle cx="211.5" cy="57.4" r="1.1" fill="#EDD086"/>
    <rect x="228" y="46" width="44" height="4.5" rx="2" fill="#10232D"/>
    <rect x="228" y="55" width="30" height="3.6" rx="1.8" fill="#10232D" opacity="0.55"/>
  </g>
</svg>
