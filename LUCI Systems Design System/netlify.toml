# Stakeholder review only — not Preview Hub (index.html stays out of publish).
# Build copies queue-linked previews (case studies, etc.) into ui_kits/review/.

[build]
  command = "node scripts/build-stakeholder-review.mjs"
  publish = "ui_kits/review"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

[[redirects]]
  from = "/api/comments"
  to = "/.netlify/functions/comments"
  status = 200

[[redirects]]
  from = "/"
  to = "/stakeholder-review.html"
  status = 200
