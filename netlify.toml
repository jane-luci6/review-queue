# Canonical Netlify config — keep ONLY this file at repo root.
# Do not add netlify.toml under LUCI Systems Design System/ (duplicate file = duplicate builds).
# Deploys use the Netlify GitHub App (webhooks are app-managed, not under repo Settings → Webhooks).
# If deploys cancel: https://github.com/settings/installations → Netlify → one repo link, one Netlify site.

[build]
  base = "LUCI Systems Design System"
  command = "npm ci && npm ci --prefix netlify/functions && npm run build:review"
  publish = "ui_kits/review"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

[functions]
  node_bundler = "esbuild"
  external_node_modules = ["@netlify/blobs"]
# Teams: REVIEW_TEAMS_WEBHOOK_OWNER (comments/approvals on live site). Due dates: .env on publish — see ui_kits/review/teams-notifications-guide.txt

[[redirects]]
  from = "/api/comments"
  to = "/.netlify/functions/comments"
  status = 200

[[redirects]]
  from = "/"
  to = "/stakeholder-review.html"
  status = 200

[[redirects]]
  from = "/messaging/*"
  to = "/messaging/:splat"
  status = 200
