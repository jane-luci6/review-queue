# Canonical Netlify config — keep ONLY this file at repo root.
# Do not add netlify.toml under LUCI Systems Design System/ (duplicate file = duplicate builds).
# If deploys cancel each other: GitHub → review-queue → Settings → Webhooks → keep ONE Netlify hook.

[build]
  base = "LUCI Systems Design System"
  command = "node scripts/build-stakeholder-review.mjs"
  publish = "ui_kits/review"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

[[redirects]]
  from = "/api/comments"
  to = "/.netlify/functions/comments"
  status = 200

[[redirects]]
  from = "/"
  to = "/stakeholder-review.html"
  status = 200

[[redirects]]
  from = "/messaging/*"
  to = "/messaging/:splat"
  status = 200
