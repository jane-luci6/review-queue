# Repo root → stakeholder review lives in LUCI Systems Design System/
# (Avoids mis-set base directory canceling or 404ing the publish folder.)

[build]
  base = "LUCI Systems Design System"
  command = "node scripts/build-stakeholder-review.mjs"
  publish = "ui_kits/review"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

[[redirects]]
  from = "/api/comments"
  to = "/.netlify/functions/comments"
  status = 200

[[redirects]]
  from = "/"
  to = "/stakeholder-review.html"
  status = 200

[[redirects]]
  from = "/messaging/*"
  to = "/messaging/:splat"
  status = 200
